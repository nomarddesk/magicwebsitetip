<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Analysis</title>

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Web Push Notifications via OneSignal — LIVE MATCH ALERTS ONLY -->
    <!-- Mobile-first: shows a slide-down popup (not a tiny floating bell) so 90%
         of mobile users can actually see/tap it. Triggers 8 seconds after first
         page view, framed around live match alerts (not ads/promos). -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          await OneSignal.init({
            appId: "fab78014-9e29-4947-a92b-cac367cb093b",
            safari_web_id: "web.onesignal.auto.05737452-6fb0-4a74-aaf2-b68bc5a2ed6a",
            // Bell icon OFF — replaced by mobile-friendly slidedown popup below.
            notifyButton: { enable: false },
            promptOptions: {
              slidedown: {
                prompts: [{
                  type: "push",
                  autoPrompt: true,                 // appears automatically
                  text: {
                    actionMessage: "🔴 Get instant alerts when matches go LIVE — never miss a goal.",
                    acceptButton: "🔔 Enable Live Alerts",
                    cancelButton: "Not now"
                  },
                  delay: {
                    pageViews: 1,                   // show after 1 page view
                    timeDelay: 8                    // wait 8 seconds so user sees content first
                  }
                }]
              }
            }
          });
        } catch (e) { console.error('OneSignal init failed:', e); }
      });
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNQZZENL62"></script>
    <script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        :root {
            --bg:#F5F5F7; --surface:#FFFFFF;
            --t1:#1D1D1F; --t2:#6E6E73; --t3:#86868B;
            --sep:rgba(0,0,0,0.08); --sep2:rgba(0,0,0,0.14);
            --live:#FF3B30; --blue:#007AFF; --gold:#FF9500; --green:#34C759;
            --navy:#0B1929;
            --r:16px; --r2:24px;
            --card-shadow:0 1px 1px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.05);
            --modal-shadow:0 24px 64px rgba(0,0,0,0.22);
        }
        body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif; background:var(--bg); color:var(--t1); overflow-x:hidden; transition:background .2s,color .2s; }
        ::-webkit-scrollbar { display:none; } * { scrollbar-width:none; }

        /* ===== Dark mode — overrides root vars when body.dark is set ===== */
        body.dark {
            --bg:#000000; --surface:#1C1C1E;
            --t1:#FFFFFF; --t2:#C7C7CC; --t3:#8E8E93;
            --sep:rgba(255,255,255,0.10); --sep2:rgba(255,255,255,0.18);
            --navy:#000000;
            --card-shadow:0 1px 1px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.05);
        }
        body.dark .tab-off:hover { background:#2C2C2E; }
        body.dark .home-tab:not(.on):hover { background:#2C2C2E; }
        body.dark .splash { background:#000; }
        body.dark .nav { background:rgba(28,28,30,0.6); border-top-color:rgba(255,255,255,0.12); box-shadow:0 -0.5px 0 rgba(255,255,255,0.06), 0 -10px 30px rgba(0,0,0,0.4); }
        body.dark .nav-item.on { background:rgba(255,255,255,0.12); }
        /* Dark mode: "active" pills use a white background (var(--t1) flips to #fff),
           so their text must flip to dark — otherwise it's white-on-white (invisible). */
        body.dark .tab-on,
        body.dark .home-tab.on,
        body.dark .btn-primary,
        body.dark .toast,
        body.dark .tds-day.on .tds-day-num,
        body.dark .cal-day.on .cal-dn,
        body.dark .cs-item.on:not(.cs-item-intl) .cs-code { color:#000; }
        body.dark .tds-day.on .tds-day-name,
        body.dark .cal-day.on .cal-dd { color:rgba(0,0,0,.6); }
        body.dark .cal-day.on .cal-day-cnt { color:#000; background:rgba(0,0,0,.12); }
        body.dark .skel { background:linear-gradient(90deg,#2C2C2E 25%,#3A3A3C 50%,#2C2C2E 75%); background-size:200% 100%; }
        body.dark .detail-note { background:#3A2E10; color:#FED7AA; border-left-color:var(--gold); }
        body.dark .inter-ad { background:linear-gradient(90deg,#3A2410 0%,#4A2E15 100%); border-color:#7C2D12; color:#FED7AA; }
        body.dark .inter-ad small { color:#FB923C; opacity:.9; }
        body.dark .detail-score-box { background:#2C2C2E; }
        body.dark .center-card,
        body.dark .sheet { background:#1C1C1E; }
        body.dark .detail-logo-img,
        body.dark .team-logo-img { background:#fff; }

        .hdr { position:sticky; top:0; z-index:100; height:62px; background:var(--navy); color:#fff; border-bottom:0.5px solid rgba(255,255,255,0.06); display:flex; align-items:center; padding:0 12px; gap:2px; }
        .hdr-btn { width:34px; height:34px; border-radius:50%; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; transition:background .15s; flex-shrink:0; }
        .hdr-btn:hover { background:rgba(255,255,255,0.10); }
        .hdr-center { flex:1; display:flex; align-items:center; justify-content:center; gap:9px; }
        .hdr-title { font-size:20px; font-weight:700; letter-spacing:-.5px; color:#fff; white-space:nowrap; }

        .top-ad-banner { width:100%; background:var(--surface); border-bottom:0.5px solid var(--sep); padding:10px 14px; display:flex; align-items:center; justify-content:center; min-height:70px; overflow:hidden; }

        .tabs-bar { background:var(--surface); border-bottom:0.5px solid var(--sep); padding:10px 14px; display:flex; gap:7px; overflow-x:auto; }
        .tab { padding:6px 15px; border-radius:100px; font-size:14px; font-weight:500; letter-spacing:-.2px; border:none; cursor:pointer; white-space:nowrap; transition:all .2s; }
        .tab-on { background:var(--t1); color:#fff; transform:scale(1.02); }
        .tab-off { background:var(--bg); color:var(--t2); }
        .tab-off:hover { background:#E8E8ED; }

        .toast { position:fixed; top:68px; left:50%; transform:translateX(-50%); background:var(--t1); color:#fff; padding:10px 18px; border-radius:100px; display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; letter-spacing:-.1px; z-index:150; pointer-events:none; white-space:nowrap; box-shadow:0 4px 24px rgba(0,0,0,0.22); animation:toastAnim 3s ease forwards; }
        @keyframes toastAnim {
            0%   { opacity:0; transform:translateX(-50%) translateY(-16px); }
            12%  { opacity:1; transform:translateX(-50%) translateY(0); }
            78%  { opacity:1; transform:translateX(-50%) translateY(0); }
            100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
        }

        .page { max-width:640px; margin:0 auto; padding:0 14px 110px; }
        .page-in { animation:pgIn .3s ease forwards; }
        @keyframes pgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .page-head { padding:26px 0 20px; }
        .page-h1 { font-size:30px; font-weight:700; letter-spacing:-.6px; line-height:1; margin-bottom:4px; }
        .page-sub { font-size:13px; color:var(--t3); }

        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:18px; }
        .stat { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); padding:14px 10px; text-align:center; }
        .stat-n { font-size:22px; font-weight:700; letter-spacing:-.5px; line-height:1; margin-bottom:3px; }
        .stat-l { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }

        .home-tabs { display:flex; gap:8px; margin-bottom:20px; }
        .home-tab { flex:1; padding:12px 10px; border-radius:14px; font-size:14px; font-weight:600; letter-spacing:-.2px; border:none; cursor:pointer; white-space:nowrap; transition:all .18s; background:var(--surface); color:var(--t2); box-shadow:var(--card-shadow); display:flex; align-items:center; justify-content:center; gap:6px; -webkit-tap-highlight-color:transparent; }
        .home-tab.on { background:var(--t1); color:#fff; box-shadow:0 4px 16px rgba(0,0,0,0.18); transform:translateY(-1px); }
        .home-tab:not(.on):hover { background:#E8E8ED; }
        .home-tab-count { font-size:11px; font-weight:600; opacity:.7; }
        .home-tab .live-badge { background:var(--live); color:#fff; font-size:11px; font-weight:800; min-width:20px; height:20px; padding:0 6px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; line-height:1; font-variant-numeric:tabular-nums; box-shadow:0 0 0 3px rgba(255,59,48,.18); animation:livePulse 1.6s ease-in-out infinite; }
        @keyframes livePulse { 0%,100%{box-shadow:0 0 0 3px rgba(255,59,48,.18)} 50%{box-shadow:0 0 0 6px rgba(255,59,48,.04)} }
        .home-tab.on .live-badge { box-shadow:0 0 0 3px rgba(255,255,255,.16); }

        .load-more { display:flex; flex-direction:column; align-items:center; gap:10px; padding:24px 20px 30px; }
        .load-more-txt { font-size:12px; color:var(--t3); font-weight:600; letter-spacing:-.1px; }

        .tab-loading { display:flex; flex-direction:column; align-items:center; gap:18px; padding:60px 20px; background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); margin-bottom:9px; animation:pgIn .2s ease forwards; min-height:240px; justify-content:center; }
        .tab-loading-spin { width:34px; height:34px; border:3px solid var(--sep2); border-top-color:var(--t1); border-radius:50%; animation:rot .8s linear infinite; }
        .tab-loading-msg { font-size:14px; color:var(--t2); font-weight:500; text-align:center; letter-spacing:-.1px; }

        .grp { display:flex; align-items:center; gap:10px; margin:24px 0 10px; }
        .grp-line { flex:1; height:.5px; background:var(--sep2); }
        .grp-txt { font-size:11px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }

        .card { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); margin-bottom:9px; overflow:hidden; cursor:pointer; transition:transform .14s,box-shadow .14s; -webkit-tap-highlight-color:transparent; }
        .card:active { transform:scale(.984); }
        .card:hover { box-shadow:0 4px 22px rgba(0,0,0,0.1),0 0 0 0.5px rgba(0,0,0,0.05); }
        .card-premium { border-left:3px solid var(--gold); }
        .card-inner { padding:13px 15px 11px; }
        .card-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; gap:6px; }
        .card-meta-left { display:flex; align-items:center; gap:6px; flex:1; min-width:0; overflow:hidden; }
        .card-league { font-size:11px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .fav { background:none; border:none; cursor:pointer; padding:2px; color:var(--sep2); transition:color .15s,transform .2s cubic-bezier(.34,1.56,.64,1); line-height:0; flex-shrink:0; }
        .fav:hover { transform:scale(1.25); }
        .fav.on { color:var(--live); }

        .card-logo-col { display:flex; flex-direction:column; gap:5px; justify-content:center; width:28px; flex-shrink:0; }
        .team-logo-img { width:24px; height:24px; object-fit:contain; border-radius:4px; background:#fff; }
        .team-logo-ph { width:24px; height:24px; background:var(--bg); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--t3); font-weight:700; }
        .card-teams { flex:1; display:flex; flex-direction:column; gap:5px; min-width:0; }
        .team-nm { font-size:15px; font-weight:600; letter-spacing:-.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .score-n { font-size:15px; font-weight:700; letter-spacing:-.2px; }
        .score-n.dim { color:var(--t3); font-weight:400; }

        .card-manual-pred { background:#1D1D1F; border-radius:10px; padding:10px 12px; margin-top:9px; border:1px solid rgba(255,149,0,0.4); }
        .card-manual-pred-lbl { font-size:10px; font-weight:800; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; display:flex; align-items:center; gap:4px; }
        .card-manual-pred-txt { font-size:13px; font-weight:700; color:#fff; line-height:1.45; }

        .card-foot { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:9px; border-top:.5px solid var(--sep); }
        .s-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:3px 9px; border-radius:100px; letter-spacing:.3px; text-transform:uppercase; }
        .s-live { background:rgba(255,59,48,.12); color:var(--live); }
        .s-fin  { background:rgba(0,0,0,.05); color:var(--t3); }
        .s-upc  { background:rgba(0,122,255,.1); color:var(--blue); }
        .s-canc { background:rgba(0,0,0,.05); color:var(--t3); }
        .dot { width:5px; height:5px; border-radius:50%; background:var(--live); animation:blink 1.6s ease-in-out infinite; flex-shrink:0; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

        .info-pill { font-size:11px; font-weight:600; color:var(--t2); background:var(--bg); border:none; border-radius:100px; padding:4px 10px; cursor:pointer; transition:background .15s,color .15s; display:flex; align-items:center; gap:4px; }
        .info-pill:hover { background:var(--t1); color:#fff; }

        .err-bar { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); border-left:3px solid var(--live); padding:13px 14px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
        .err-txt { flex:1; font-size:13px; font-weight:500; }
        .retry-btn { font-size:11px; font-weight:700; background:var(--bg); border:none; border-radius:100px; padding:5px 12px; cursor:pointer; flex-shrink:0; }
        .wake-bar { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); padding:13px 14px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }

        .skel-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); padding:14px 15px; margin-bottom:9px; display:flex; flex-direction:column; gap:9px; }
        .skel { background:linear-gradient(90deg,var(--bg) 25%,#E8E8ED 50%,var(--bg) 75%); background-size:200% 100%; animation:shim 1.4s infinite; border-radius:5px; }
        @keyframes shim { from{background-position:200% 0} to{background-position:-200% 0} }

        /* Apple "liquid glass" tab bar — translucent, heavy blur + saturation,
           bolder labels, and a soft pill highlight behind the active tab. */
        .nav { position:fixed; bottom:0; left:0; right:0; height:84px; background:rgba(255,255,255,0.66); backdrop-filter:blur(34px) saturate(200%); -webkit-backdrop-filter:blur(34px) saturate(200%); border-top:.5px solid rgba(255,255,255,0.55); box-shadow:0 -0.5px 0 var(--sep), 0 -10px 30px rgba(0,0,0,0.07); display:flex; align-items:flex-start; justify-content:space-around; padding-top:9px; z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; min-width:60px; padding:7px 16px 5px; border-radius:16px; transition:background .2s, transform .15s; -webkit-tap-highlight-color:transparent; }
        .nav-item:active { transform:scale(.92); }
        .nav-item.on { background:rgba(0,0,0,0.06); }
        .nav-ico { width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
        .nav-lbl { font-size:11px; font-weight:600; letter-spacing:.1px; }
        .nav-item.on .nav-ico, .nav-item.on .nav-lbl { color:var(--t1); }
        .nav-item.off .nav-ico, .nav-item.off .nav-lbl { color:#8E8E93; }
        .nav-item.on .nav-lbl { font-weight:800; }

        .overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.48); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:flex; align-items:flex-end; justify-content:center; }
        .sheet { background:var(--surface); border-radius:var(--r2) var(--r2) 0 0; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; padding:10px 22px 44px; animation:sheetUp .38s cubic-bezier(.32,.72,0,1) forwards; }
        @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .handle { width:34px; height:4px; background:var(--sep2); border-radius:2px; margin:0 auto 18px; }

        .detail-head { text-align:center; margin-bottom:20px; }
        .detail-league { font-size:11px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
        .detail-teams { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; }
        .detail-team { flex:1; text-align:center; }
        .detail-logo-img { width:64px; height:64px; object-fit:contain; border-radius:16px; margin:0 auto 8px; display:block; background:#fff; }
        .detail-logo-ph { width:64px; height:64px; background:var(--bg); border-radius:16px; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:var(--t2); }
        .detail-team-nm { font-size:13px; font-weight:600; letter-spacing:-.1px; }
        .detail-vs { font-size:12px; color:var(--t3); font-weight:600; flex-shrink:0; }
        .detail-score-box { background:var(--t1); border-radius:var(--r); padding:18px 20px; margin-bottom:14px; text-align:center; }
        .detail-score-big { font-size:40px; font-weight:700; color:#fff; letter-spacing:-1px; line-height:1; margin-bottom:6px; }
        .detail-score-sub { font-size:12px; color:rgba(255,255,255,.5); font-weight:500; }
        .detail-live-min { font-size:14px; font-weight:800; color:var(--live); margin-top:4px; font-variant-numeric:tabular-nums; letter-spacing:.5px; }
        .detail-status-row { display:flex; justify-content:center; margin-bottom:16px; }
        .detail-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
        .detail-info-cell { background:var(--bg); border-radius:12px; padding:12px; text-align:center; }
        .detail-info-val { font-size:15px; font-weight:700; letter-spacing:-.2px; margin-bottom:2px; }
        .detail-info-lbl { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }

        .ai-analysis-box { background:var(--bg); border-radius:var(--r); padding:14px 16px; margin-bottom:14px; }
        .ai-analysis-lbl { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.4px; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
        .ai-analysis-txt { font-size:14px; color:var(--t1); line-height:1.55; font-weight:400; }

        .manual-pred-box { background:#1D1D1F; border:2px solid var(--gold); border-radius:var(--r); padding:16px; margin-bottom:16px; }
        .manual-pred-label { font-size:10px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; display:flex; align-items:center; gap:5px; }
        .manual-pred-txt { font-size:15px; font-weight:600; color:#fff; line-height:1.55; }

        .pro-tip-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:800; padding:3px 9px; border-radius:100px; background:var(--gold); color:#fff; letter-spacing:.4px; text-transform:uppercase; flex-shrink:0; }

        .card-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .card-left { display:flex; align-items:stretch; gap:10px; flex:1; min-width:0; }
        .card-right-col { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .card-scores-col { display:flex; flex-direction:column; align-items:flex-end; gap:5px; min-width:20px; }
        /* Predicted scoreline box (middle of the card). Neutral before kickoff;
           turns green if our pick was right after FT, red if it was wrong. */
        .card-pred-score { flex-shrink:0; align-self:center; min-width:44px; text-align:center; padding:6px 9px; border-radius:10px; border:1.5px solid var(--sep2); background:var(--bg); font-size:15px; font-weight:800; color:var(--t1); font-variant-numeric:tabular-nums; letter-spacing:.5px; }
        .card-pred-score.cps-correct { border-color:var(--green); background:rgba(52,199,89,.12); color:var(--green); }
        .card-pred-score.cps-wrong { border-color:var(--live); background:rgba(255,59,48,.12); color:var(--live); }
        .pred-front { display:flex; flex-direction:column; align-items:center; gap:3px; }
        .pred-front-circle { width:44px; height:44px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:800; color:#fff; box-shadow:0 2px 10px rgba(255,149,0,.45); flex-shrink:0; }

const LangContext = React.createContext({ lang:'en', locale:'en-US', t:(k)=>(I18N.en[k]||k) });
const useT = () => useContext(LangContext);
function makeT(lang) {
    return (key, vars) => {
        let s = (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key;
        if (vars) for (const k in vars) s = s.split('{' + k + '}').join(vars[k]);
        return s;
    };
}

    [/copa libertadores|copa sudamericana|copa america|conmebol|concacaf|caf champions|afcon|afc champions/i,'International'],
];
const getCountryForLeague = (leagueName) => {
    if (!leagueName) return 'International';
    const key = leagueName.toLowerCase().trim();
    if (LEAGUE_COUNTRY_MAP[key]) return LEAGUE_COUNTRY_MAP[key];
    for (const [pattern, country] of LEAGUE_PATTERNS) {
        if (pattern.test(leagueName)) return country;
    }
    return 'International';
};
// Prefer the backend's country field if it ever appears; otherwise infer from
// the league name. This is what every country-grouping/filter uses.
// Normalize every "not a single country" label (UEFA, World Cup, Copa America,
// continental confederations, friendlies, etc.) into one "International" bucket
// so all worldwide matches collapse under the single pinned International button.
const INTL_LABELS = new Set([
    'world','international','intl','europe','asia','africa','oceania',
    'north america','south america','south & central america','central america',
    'caribbean','uefa','conmebol','concacaf','caf','afc','ofc','fifa',
]);
const normalizeCountry = (c) => {
    if (!c) return c;
    return INTL_LABELS.has(String(c).trim().toLowerCase()) ? 'International' : c;
};
const getMatchCountry = (m) => normalizeCountry(m.country || getCountryForLeague(m.leagueName));

const FIN_SET = new Set(['FT','AET','PEN','Pen.']);
const UPC_SET = new Set(['NS','TBD']);
const CANC_SET = new Set(['Postp.','Canc.','Susp.','WO','AWD','ABD']);
const TIME_RE = /^\d{2}:\d{2}$/;

const cat = s => {
    if (!s) return 'unknown';
    if (FIN_SET.has(s))  return 'finished';
    if (CANC_SET.has(s)) return 'cancelled';
    if (UPC_SET.has(s) || TIME_RE.test(s)) return 'upcoming';
    return 'live';
};

const statusLabel = s => {
    if (!s) return '';
    if (s === 'HT')  return 'Half Time';
    if (s === 'FT')  return 'Full Time';
    if (s === 'AET') return 'AET';
    if (s === 'PEN' || s === 'Pen.') return 'Penalties';
    if (s === 'LIVE') return 'LIVE';
    if (s === 'NS')   return '';
    const n = parseInt(s);
    if (!isNaN(n)) return `${n}'`;
    return s;
};

/* === LIVE MINUTE EXTRAPOLATION ===
   Backend stores match.elapsed (number) + match.elapsedAt (ms timestamp of the scrape).
   Between scrapes we tick the displayed minute forward second-by-second.       */
const liveMinute = (m) => {
    if (!m) return '';
    const raw = String(m.statusRaw || '').toUpperCase();
    if (['FT','AET','PEN','PEN.'].includes(raw)) return 'FT';
    if (raw === 'HT' || raw === 'BT') return 'HT';
    if (m.elapsed == null) return '';
    const sinceMin = m.elapsedAt ? (Date.now() - m.elapsedAt) / 60000 : 0;
    let now = m.elapsed + Math.max(0, sinceMin);
    if (now > 95) now = 95;
    const whole = Math.floor(now);
    if (whole <= 45) return `${String(whole).padStart(2,'0')}'`;
    if (whole <= 50) {
        const add = whole - 45;
        return add === 0 ? "45'" : `45+${add}'`;
    }
    if (whole <= 60 && (raw === '1H' || raw === '')) return 'HT';
    if (whole <= 90) return `${String(whole).padStart(2,'0')}'`;
    const add = whole - 90;
    return add === 0 ? "90'" : `90+${add}'`;
};

/* Re-render hook — fires every second while `active` is true. */
const useTickingNow = (active) => {
    const [, setTick] = useState(0);
    useEffect(() => {
        if (!active) return;
        const id = setInterval(() => setTick(t => t + 1), TIMER_TICK_MS);
        return () => clearInterval(id);
    }, [active]);
};

const statusBadgeLabel = (m, c, t) => {
    const tr = t || ((k) => k);
    if (c === 'live') {
        const min = liveMinute(m);
        if (min && min !== 'FT') return `${tr('b_live')}  ${min}`;
        return tr('b_live');
    }
    if (c === 'finished')  return tr('b_ft');
    if (c === 'upcoming')  return m.time ? `${tr('b_ko')} ${m.time}` : tr('b_upcoming');
    if (c === 'cancelled') return statusLabel(m.status) || 'Cancelled';
    return statusLabel(m.status);
};

const getGoals = m => {
    const h = m.home?.score;
    const a = m.away?.score;
    if (h == null || a == null) return null;
    return { h: String(h), a: String(a) };
};

const fid = m => m?.id || m?.static_id || m?.fixture?.id || null;

// Convert a match's date + time into a sortable UTC millisecond timestamp.
// Used to order Upcoming (soonest first), Live (earliest kickoff first), Past (most recent first).
const matchTimestamp = (m) => {
    if (!m || !m.date) return 0;
    const t = Date.parse(`${m.date}T${m.time || '00:00'}:00Z`);
    return isNaN(t) ? 0 : t;
};

const matchToPred = m => {
    if (!m || !m.prediction) return null;
    const label = m.prediction === '1' ? 'Home Win'
                : m.prediction === '2' ? 'Away Win'
                : m.prediction === 'X' ? 'Draw'
                : '';
    return {
        loading: false,
        code:    m.prediction,
        label,
        score:   m.correctScore || null,
        advice:  m.advice || null,
        hp:      m.probabilities?.home || '—',
        dp:      m.probabilities?.draw || '—',
        ap:      m.probabilities?.away || '—',
    };
};

// i18n key for a 1X2 prediction code, so the label can be translated at render time.
const predLabelKey = code => code === '1' ? 'home_win' : code === '2' ? 'away_win' : code === 'X' ? 'draw' : null;

// For a finished match, was our 1X2 prediction correct? → 'correct' | 'wrong' | null.
// Mirrors pitchpredictions.com: correct = green badge, wrong = red badge.
const predictionOutcome = m => {
    if (!m || !m.prediction || cat(m.status) !== 'finished') return null;
    const g = getGoals(m);
    if (!g) return null;
    const h = parseInt(g.h, 10), a = parseInt(g.a, 10);
    if (isNaN(h) || isNaN(a)) return null;
    const actual = h > a ? '1' : h < a ? '2' : 'X';
    return m.prediction === actual ? 'correct' : 'wrong';
};

const generateAnalysis = m => {
    if (!m?.prediction) return null;
    const subject = m.prediction === '1' ? `${m.home?.name || 'the home side'} to win`
                  : m.prediction === '2' ? `${m.away?.name || 'the away side'} to win`
                  : 'a draw';
    const pct = Math.max(
        parseInt(m.probabilities?.home) || 0,
        parseInt(m.probabilities?.draw) || 0,
        parseInt(m.probabilities?.away) || 0,
    );
    const score  = m.correctScore ? ` Most likely scoreline: ${m.correctScore}.` : '';
    const advice = m.advice ? ` Tip: ${m.advice}.` : '';
    return `Model favours ${subject}${pct ? ` (${pct}% confidence)` : ''}.${score}${advice}`;
};

const LazySlot = ({ children, minHeight = 175 }) => {
    const ref = useRef(null);
    const [visible, setVisible] = useState(false);
    useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
            ([entry]) => setVisible(entry.isIntersecting),
            { rootMargin: '800px 0px' }
        );
        observer.observe(el);
        return () => observer.disconnect();
    }, []);
    return (
        <div ref={ref} className="lazy-slot" style={{ minHeight }}>
            {visible ? children : null}
        </div>
    );
};

    const [tab,            setTab]            = useState('Home');
    const [sport,          setSport]          = useState('Football');
    const [csSport,        setCsSport]        = useState(null);
    const [favs,           setFavs]           = useState(() => {
        try { return JSON.parse(localStorage.getItem('magic-favs') || '[]'); } catch { return []; }
    });
    const [matches,        setMatches]        = useState([]);
    const [loading,        setLoading]        = useState(true);
    const [waking,         setWaking]         = useState(false);
    const [err,            setErr]            = useState(null);
    const [showToast,      setShowToast]      = useState(false);
    const [detailMatch,    setDetailMatch]    = useState(null);
    const [updatedAt,      setUpdatedAt]      = useState(null);

    const [homeTab,        setHomeTab]        = useState('Today');
    const [tabLoading,     setTabLoading]     = useState(false);
    const [visibleCount,   setVisibleCount]   = useState(PAGE_SIZE);
    const [theme,          setTheme]          = useState(() => {
        try { return localStorage.getItem('magic-theme') || 'light'; } catch { return 'light'; }
    });
    const [lang,           setLang]           = useState(() => {
        try { return localStorage.getItem('magic-lang') || 'en'; } catch { return 'en'; }
    });
    const [langOpen,       setLangOpen]       = useState(false);
    const t      = useMemo(() => makeT(lang), [lang]);
    const locale = LOCALE[lang] || 'en-US';
    // selectedDate is YYYY-MM-DD (UTC). When equal to today, the Home tab shows
    // Live/Upcoming/Past tabs + stats; for future dates we show only Upcoming.
    const [selectedDate,   setSelectedDate]   = useState(() => new Date().toISOString().slice(0, 10));

    useEffect(() => {
        try { localStorage.setItem('magic-favs', JSON.stringify(favs)); } catch {}
    }, [favs]);

    // Dark mode — apply class to <body> + persist
    useEffect(() => {
        document.body.className = theme === 'dark' ? 'dark' : '';
        try { localStorage.setItem('magic-theme', theme); } catch {}
    }, [theme]);

    // Language — persist + set <html> lang/dir (Arabic renders right-to-left)
    useEffect(() => {
        try { localStorage.setItem('magic-lang', lang); } catch {}
        document.documentElement.lang = lang;
        document.documentElement.dir = RTL_LANGS.includes(lang) ? 'rtl' : 'ltr';
    }, [lang]);

    // Try to hydrate from localStorage on first paint so the UI isn't empty
    // while we wait for the network — and so if Railway is down we still
    // show *something* useful.
    useEffect(() => {
        try {
            const cached = JSON.parse(localStorage.getItem('magic-cache') || 'null');
            if (cached && Array.isArray(cached.matches) && cached.matches.length) {
                setMatches(cached.matches);
                setUpdatedAt(cached.updatedAt);
            }
        } catch {}
    }, []);

    const load = useCallback(async (silent = false) => {
        if (!silent) {
            setLoading(true);
            setShowToast(true);
            setTimeout(() => setShowToast(false), 3000);
        }
        setErr(null);
        const wt = !silent ? setTimeout(() => setWaking(true), 4000) : null;
        try {
            const ctrl = new AbortController();
            const tt   = setTimeout(() => ctrl.abort(), 35000);
            const res  = await fetch(`${BACKEND_URL}/api/scores`, {signal:ctrl.signal});
            clearTimeout(tt);
            if (wt) clearTimeout(wt);
            setWaking(false);
            if (!res.ok) throw new Error(`${res.status}`);
            const data = await res.json();
            const list = Array.isArray(data.matches) ? data.matches : [];
            setMatches(list);
            const stamp = data.updatedAt || new Date().toISOString();
            setUpdatedAt(stamp);
            // Cache successful response so we can survive Railway downtime.
            try {
                localStorage.setItem('magic-cache', JSON.stringify({
                    matches: list, updatedAt: stamp, cachedAt: Date.now(),
                }));
            } catch {}
        } catch (e) {
            if (wt) clearTimeout(wt);
            setWaking(false);
            // Distinguish "user has no internet" vs "Railway is down / maintenance"
            //   Offline → "Please check your internet connection"
            //   Server error → "Website maintenance in progress, some data may be delayed"
            const isOffline = !navigator.onLine ||
                              (e instanceof TypeError && /failed to fetch|network/i.test(e.message)) ||
                              /networkerror/i.test(e.name || '');
            const offlineMsg = "📡 Please connect or check your internet connection.";
            const maintenanceMsg = "🛠️ Website maintenance in progress — some data may be delayed. We apologize in advance.";
            // Fall back to cached data if we have any.
            let usedCache = false;
            try {
                const cached = JSON.parse(localStorage.getItem('magic-cache') || 'null');
                if (cached && Array.isArray(cached.matches) && cached.matches.length) {
                    setMatches(cached.matches);
                    setUpdatedAt(cached.updatedAt);
                    setErr(isOffline ? 'offline' : 'maintenance');
                    usedCache = true;
                }
            } catch {}
            if (!silent && !usedCache) {
                setErr(isOffline ? 'offline' : 'maintenance');
            }
        } finally {
            if (!silent) setLoading(false);
        }
    }, []);

    useEffect(() => {
        const t  = setTimeout(() => setSplash(false), 3000);
        load(false);
        const iv = setInterval(() => load(true), REFRESH_MS);
        return () => { clearTimeout(t); clearInterval(iv); };
    }, [load]);

    useEffect(() => {
        if (!tabLoading) return;
        const done = setTimeout(() => setTabLoading(false), TAB_LOADING_MAX_MS);
        return () => clearTimeout(done);
    }, [tabLoading]);

    // Show loading whenever the selected date changes (skip first mount).
    const dateChangedOnce = useRef(false);
    useEffect(() => {
        if (!dateChangedOnce.current) { dateChangedOnce.current = true; return; }
        setTabLoading(true);
        load(true).finally(() => setTabLoading(false));
    }, [selectedDate, load]);

    const openDetail = useCallback(m => setDetailMatch(m), []);
    const toggleFav  = useCallback(id => {
        if (!id) return;
        setFavs(p => p.includes(id) ? p.filter(f => f !== id) : [...p, id]);
    }, []);

    // Date-type detection:
    //   isViewingToday → show Live / Upcoming / Past tabs
    //   isPastDate     → show only past matches (Live/Upcoming hidden)
    //   isFutureDate   → show only upcoming matches (Live/Past hidden)
    const todayIso       = new Date().toISOString().slice(0, 10);
    const isViewingToday = selectedDate === todayIso;
    const isPastDate     = selectedDate < todayIso;
    const isFutureDate   = selectedDate > todayIso;

    // Country drill-down state. null = country list view; set = detail view.
    const [selectedCountry, setSelectedCountry] = useState(null);

    const liveMatches     = useMemo(() => matches.filter(m => cat(m.status) === 'live')
        .sort((a, b) => matchTimestamp(a) - matchTimestamp(b)), [matches]);
    const upcomingMatches = useMemo(() => matches.filter(m => cat(m.status) === 'upcoming' && m.date === selectedDate)
        .sort((a, b) => matchTimestamp(a) - matchTimestamp(b)), [matches, selectedDate]);
    const pastMatches     = useMemo(() => matches.filter(m => cat(m.status) === 'finished' && getGoals(m) && m.date === selectedDate)
        .sort((a, b) => matchTimestamp(b) - matchTimestamp(a)), [matches, selectedDate]);
    const savedMatches    = useMemo(() => matches.filter(m => favs.includes(fid(m)))
        .sort((a, b) => matchTimestamp(a) - matchTimestamp(b)), [matches, favs]);
    const alertMatches    = useMemo(() => matches.filter(m => { const n=parseInt(m.statusRaw||m.status); return !isNaN(n)&&n>=75&&n<120; })
        .sort((a, b) => matchTimestamp(a) - matchTimestamp(b)), [matches]);

    // Merged "Today's Matches" = live + today's upcoming + today's finished, in one
    // list (live first, then soonest kickoff, then most-recent results).
    const todaysMatches = useMemo(() => {
        const upc  = matches.filter(m => cat(m.status) === 'upcoming' && m.date === todayIso)
            .sort((a, b) => matchTimestamp(a) - matchTimestamp(b));
        const past = matches.filter(m => cat(m.status) === 'finished' && getGoals(m) && m.date === todayIso)
            .sort((a, b) => matchTimestamp(b) - matchTimestamp(a));
        return [...liveMatches, ...upc, ...past];
    }, [matches, liveMatches, todayIso]);

    // Snap homeTab to the only valid value for the current date type so
    // we never try to render "Live" matches for a past date, etc.
    useEffect(() => {
        if (isViewingToday && homeTab !== 'Live' && homeTab !== 'Today') setHomeTab('Today');
    }, [isViewingToday, homeTab]);

    // (selectedCountry auto-select logic lives below after availableCountries
    // is computed; nothing to do here.)

    const handleHomeTabClick = useCallback(async (t) => {
        setHomeTab(t);
        setTabLoading(true);
        try { await load(true); } finally { setTabLoading(false); }
    }, [load]);

    // Compute the 5-day strip starting from today + count matches per day.
    // Date strip used by BOTH the top horizontal strip and the calendar popup.
    // Range: Past 5 days + Today + Future 10 days = 16 items, sorted oldest → newest.
    const dateStrip = useMemo(() => {
        const today = new Date();
        const isoOf = (d) => d.toISOString().slice(0, 10);
        const counts = {};
        for (const m of matches) {
            if (!m.date) continue;
            counts[m.date] = (counts[m.date] || 0) + 1;
        }
        return Array.from({length:16}, (_,i) => {
            const offset = i - 5;  // -5..-1 = past, 0 = today, 1..10 = future
            const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + offset);
            const iso = isoOf(d);
            return {
                iso,
                weekday: d.toLocaleDateString(locale,{weekday:'short'}),
                day: d.getDate(),
                isToday: offset === 0,
                count: counts[iso] || 0,
            };
        });
    }, [matches, locale]);

    // pickDate is shared by the calendar cards AND the "Back to today" button.
    // When picking Today we auto-select the most useful tab (Live → Upcoming → Past)
    // so the page never lands on an empty tab and looks broken.
    const pickDate = (iso) => {
        setSelectedDate(iso);
        setSelectedCountry(null);   // reset to "All countries" so the new date lands on a full list
        if (iso === todayIso) {
            setHomeTab('Today');
        }
        setCalOpen(false);
    };

    // Matches relevant to the current date type (before applying the
    // country filter). Drives BOTH the country slider AND the displayed list.
    const dateRelevantMatches = useMemo(() => {
        if (isPastDate)   return pastMatches;
        if (isFutureDate) return upcomingMatches;
        if (homeTab === 'Live') return liveMatches;
        return todaysMatches;   // "Today's Matches" = live + upcoming + past merged
    }, [isPastDate, isFutureDate, homeTab, liveMatches, upcomingMatches, pastMatches, todaysMatches]);

    // Country flag slider data. Always shows the COMPLETE country directory
    // (ALL_COUNTRIES) so users can browse the full list — not just countries
    // with matches today. Sort order: match count desc, then alphabetical, so
    // active countries float to the front while everything else stays browsable.
    const availableCountries = useMemo(() => {
        const pool = matches.filter(m => {
            if (isViewingToday && cat(m.status) === 'live') return true;
            return m.date === selectedDate;
        });
        const counts = {};
        for (const m of pool) {
            const c = getMatchCountry(m);
            counts[c] = (counts[c] || 0) + 1;
        }
        const merged = new Set([...ALL_COUNTRIES, ...Object.keys(counts)]);
        const out = Array.from(merged).sort((a, b) => {
            const ca = counts[a] || 0;
            const cb = counts[b] || 0;
            if (cb !== ca) return cb - ca;
            return a.localeCompare(b);
        });
        console.log('[MagicAnalysis] Total countries in slider:', out.length);
        console.log('[MagicAnalysis] Countries with matches today:', Object.keys(counts).length);
        console.log('[MagicAnalysis] Match counts by country:', counts);
        console.log('[MagicAnalysis] Full slider order:', out);
        return out;
    }, [matches, selectedDate, isViewingToday]);

    // NO forced auto-select. selectedCountry === null means "show ALL countries"
    // (the default) so the page always lands on a full list of matches instead of
    // getting stuck on an empty country. Users opt into a country by tapping a chip;
    // pickDate() resets back to null on every date change.
    //
    // Per-country counts so the stat cards + Live/Upcoming/Past pills ALWAYS match
    // the visible list. When no country is selected these equal the global totals.
    const countOf = (list) => selectedCountry
        ? list.filter(m => getMatchCountry(m) === selectedCountry).length
        : list.length;
    const liveCount     = countOf(liveMatches);
    const upcomingCount = countOf(upcomingMatches);
    const pastCount     = countOf(pastMatches);
    const alertCount    = countOf(alertMatches);
    const todayCount    = countOf(todaysMatches);

    // Matches that actually get rendered: date-relevant + matching the
    // currently-selected country filter.
    const filteredMatches = useMemo(() => {
        if (!selectedCountry) return dateRelevantMatches;
        return dateRelevantMatches.filter(m => getMatchCountry(m) === selectedCountry);
    }, [dateRelevantMatches, selectedCountry]);

    // Group filtered matches by league/competition so we can show competition
    // names as section headers above each cluster of cards.
    // Stable league ordering for pagination: sort the flat list by league name so
    // revealing more matches always APPENDS at the bottom (new league blocks never
    // get inserted above what the user is already looking at).
    const orderedMatches = useMemo(() => {
        const arr = [...filteredMatches];
        arr.sort((a, b) => {
            const la = (a.leagueName || '~').toLowerCase();
            const lb = (b.leagueName || '~').toLowerCase();
            return la < lb ? -1 : la > lb ? 1 : 0;   // stable sort keeps time-order within a league
        });
        return arr;
    }, [filteredMatches]);

    // Only the first `visibleCount` matches are grouped + rendered. Infinite scroll
    // raises visibleCount by PAGE_SIZE each time the bottom sentinel appears.
    const matchesByLeague = useMemo(() => {
        const slice = orderedMatches.slice(0, visibleCount);
        const byLeague = {};
        const order = [];
        for (const m of slice) {
            const l = m.leagueName || 'Other';
            if (!byLeague[l]) { byLeague[l] = []; order.push(l); }
            byLeague[l].push(m);
        }
        return order.map((league) => ({ league, matches: byLeague[league] }));
    }, [orderedMatches, visibleCount]);

    // Smoothly center the selected country chip whenever it changes.
    const countrySliderRef = useRef(null);
    useEffect(() => {
        if (!selectedCountry || !countrySliderRef.current) return;
        const el = countrySliderRef.current.querySelector(`[data-country-name="${selectedCountry}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }, [selectedCountry]);

    // ===== Infinite scroll (progressive reveal, PAGE_SIZE matches at a time) =====
    // Reset to the first page whenever the visible context changes (date, country,
    // or Live/Today tab) so the user always re-enters a list from the top.
    useEffect(() => {
        setVisibleCount(PAGE_SIZE);
    }, [selectedDate, selectedCountry, homeTab]);

    // When the bottom sentinel scrolls into view, pause briefly (so it feels like
    // fresh data is being fetched) then reveal PAGE_SIZE more. The ref guard stops
    // a single scroll from queuing several reveals at once.
    const sentinelRef    = useRef(null);
    const loadingMoreRef = useRef(false);
    useEffect(() => {
        const el = sentinelRef.current;
        if (!el) return;
        const obs = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting && !loadingMoreRef.current) {
                loadingMoreRef.current = true;
                setTimeout(() => {
                    setVisibleCount((c) => c + PAGE_SIZE);
                    loadingMoreRef.current = false;
                }, LOAD_MORE_DELAY_MS);
            }
        }, { rootMargin: '150px 0px' });
        obs.observe(el);
        return () => obs.disconnect();
        // loading/tabLoading included so the effect re-runs (and re-attaches) once
        // the skeleton is replaced by the real list and the sentinel actually exists.
    }, [filteredMatches.length, visibleCount, loading, tabLoading]);

    const renderCard = m => {
        const k = fid(m) || `${m.home?.name}${m.away?.name}${m.status}`;
        return (
            <LazySlot key={k} minHeight={175}>
                <MatchCard
                    match={m}
                    pred={matchToPred(m)}
                    onOpen={openDetail}
                    onToggleFav={toggleFav}
                    isFav={favs.includes(fid(m))}
                />
            </LazySlot>
        );
    };

    const renderHomeBody = () => {
        if (tabLoading) return <TabLoading/>;
        if (loading)    return [1,2,3].map(i => <Skel key={i}/>);
        if (matchesByLeague.length === 0) {
            if (selectedCountry) {
                return <EmptyState
                    title={t('empty_country', {c: selectedCountry})}
                    sub={t('empty_country_sub')}/>;
            }
            return <EmptyState title={isPastDate ? t('empty_past') : t('empty_tab')}/>;
        }
        const hasMore = visibleCount < orderedMatches.length;
        return (
            <>
                {matchesByLeague.map(({ league, matches: leagueMatches }) => {
                    // Flag/label come from the league's own matches so the "All countries"
                    // view shows the correct flag per section, not a single global one.
                    const c = getMatchCountry(leagueMatches[0]);
                    return (
                        <div key={league} className="league-block">
                            <div className="league-block-title">
                                <span className="league-block-flag">{getCountryFlag(c)}</span>
                                {c ? `${c} · ${league}` : league}
                            </div>
                            {leagueMatches.map(renderCard)}
                        </div>
                    );
                })}
                {hasMore && (
                    <div ref={sentinelRef} className="load-more">
                        <div className="tab-loading-spin"/>
                        <span className="load-more-txt">{t('loading_more')}</span>
                    </div>
                )}
            </>
        );
    };

    const today  = new Date().toLocaleDateString(locale, {weekday:'long',month:'long',day:'numeric'});
    const sports = [['Football','⚽'],['Basketball','🏀'],['Tennis','🎾'],['Hockey','🏒'],['Baseball','⚾']];

    return (
        <LangContext.Provider value={{ lang, locale, t }}>
        <>
            {splash && (
                <div className="splash">
                    <div className="splash-inner">
                        <div style={{width:76,height:76,background:'#fff',borderRadius:18,boxShadow:'0 8px 32px rgba(0,0,0,0.12)',display:'flex',alignItems:'center',justifyContent:'center',border:'.5px solid rgba(0,0,0,0.06)'}}>
                            <MagicLogo size={58}/>
                        </div>
                        <div style={{textAlign:'center'}}>
                            <div style={{fontSize:22,fontWeight:700,letterSpacing:'-.5px'}}>Magic Analysis</div>
                            <div style={{fontSize:13,color:'var(--t3)',marginTop:2}}>{t('tagline')}</div>
                        </div>
                    </div>
                </div>
            )}

            {showToast && (
                <div className="toast"><div className="spin"/>{({en:'Fetching latest data…',fr:'Chargement des données…',es:'Cargando datos…',pt:'Carregando dados…',sr:'Učitavanje podataka…',ar:'جارٍ تحميل البيانات…'})[lang]||'Fetching latest data…'}</div>
            )}

            <header className="hdr">
                <button className="hdr-btn" onClick={()=>setCalOpen(true)} title="Pick date"><IcoCal/></button>
                <div className="hdr-center"><MagicLogo size={29}/><span className="hdr-title">Magic Analysis</span></div>
                <button className="hdr-btn" onClick={()=>setLangOpen(true)} title={t('language')} aria-label={t('language')}>
                    <span style={{fontSize:18,lineHeight:1}}>{(LANGS.find(l=>l[0]===lang)||LANGS[0])[2]}</span>
                </button>
                <button className="hdr-btn" onClick={()=>setTheme(theme==='dark'?'light':'dark')} title={theme==='dark'?'Light mode':'Dark mode'}>
                    {theme==='dark' ? <IcoSun/> : <IcoMoon/>}
                </button>
                <button className="hdr-btn" onClick={()=>load()} title="Refresh"><IcoRef/></button>
            </header>

            {tab === 'Home' ? (
                <div className="top-date-strip">
                    {dateStrip.map(d => (
                        <button key={d.iso}
                            className={`tds-day${selectedDate === d.iso ? ' on' : ''}${d.isToday ? ' tds-today' : ''}`}
                            onClick={() => pickDate(d.iso)}>
                            <span className="tds-day-name">{d.isToday ? t('stat_today') : d.weekday}</span>
                            <span className="tds-day-num">{d.day}</span>
                        </button>
                    ))}
                </div>
            ) : (
                <div className="top-ad-banner">
                    {/* INSERT DISPLAY AD CODE HERE */}
                </div>
            )}

            <div className="tabs-bar">
                {sports.map(([nm,ic]) => (
                    <button key={nm} className={`tab ${sport===nm?'tab-on':'tab-off'}`}
                        onClick={()=>nm==='Football'?setSport(nm):setCsSport(nm)}>
                        {ic} {nm}
                    </button>
                ))}
            </div>

            {tab === 'Home' && availableCountries.length > 0 && (
                <div className="country-slider" ref={countrySliderRef}>
                    {/* Pinned #1 — All countries — clears the filter so every match shows */}
                    <button
                        data-country-name="__ALL__"
                        className={`cs-item cs-item-intl${selectedCountry === null ? ' on' : ''}`}
                        onClick={() => setSelectedCountry(null)}
                        title={t('show_all')}>
                        <span className="cs-flag">🌍</span>
                        <span className="cs-code">{t('all')}</span>
                    </button>
                    {/* Every country (most matches first). "International" appears here as a normal chip. */}
                    {availableCountries.map((country) => (
                        <button key={country}
                            data-country-name={country}
                            className={`cs-item${selectedCountry === country ? ' on' : ''}`}
                            onClick={() => setSelectedCountry(selectedCountry === country ? null : country)}
                            title={country}>
                            <span className="cs-flag">{getCountryFlag(country)}</span>
                            <span className="cs-code">{getCountryCode(country)}</span>
                        </button>
                    ))}
                </div>
            )}

            <main className="page">
                {tab==='Home' && (
                    <div className="page-in">
                        <div className="page-head">
                            <h1 className="page-h1">{isViewingToday ? t('title_predictions') : t('title_upcoming')}</h1>
                            <p className="page-sub">{today}{updatedAt ? ` · ${t('refreshed')} ${new Date(updatedAt).toLocaleTimeString(locale,{hour:'2-digit',minute:'2-digit'})}` : ''}</p>
                            {!isViewingToday && (
                                <button className="back-to-today" onClick={() => pickDate(todayIso)}>
                                    {t('back_today')}
                                </button>
                            )}
                        </div>

                        {isViewingToday && (
                            <div className="stats">
                                {[['stat_today',todayCount],['stat_live',liveCount],['stat_finished',pastCount],['stat_alerts',alertCount]].map(([l,v]) => (
                                    <div key={l} className="stat">
                                        <div className="stat-n">{v}</div>
                                        <div className="stat-l">{t(l)}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {isViewingToday && (
                            <div className="home-tabs">
                                <button className={`home-tab${homeTab==='Live'?' on':''}`} onClick={()=>handleHomeTabClick('Live')}>
                                    🔴 {t('tab_live')}
                                    {liveCount > 0 && <span className="live-badge">{liveCount}</span>}
                                </button>
                                <button className={`home-tab${homeTab==='Today'?' on':''}`} onClick={()=>handleHomeTabClick('Today')}>
                                    {t('tab_today')} <span className="home-tab-count">({todayCount})</span>
                                </button>
                            </div>
                        )}

                        {selectedCountry && (
                            <button className="show-all-bar" onClick={() => setSelectedCountry(null)}>
                                <span className="sab-left">
                                    <span className="sab-flag">{getCountryFlag(selectedCountry)}</span>
                                    {t('showing_only', {c: selectedCountry})}
                                </span>
                                <span className="sab-link">{t('show_all')}</span>
                            </button>
                        )}

                        {waking && (
                            <div className="wake-bar">
                                <div className="spin" style={{flexShrink:0}}/>
                                <span style={{fontSize:13,fontWeight:500,color:'var(--t2)'}}>{t('waking')}</span>
                            </div>
                        )}
                        {err && !loading && (
                            <div className="err-bar">
                                <span className="err-txt">{t(err)}</span>
                                <button className="retry-btn" onClick={()=>load()}>{t('retry')}</button>
                            </div>
                        )}

                        {renderHomeBody()}

                        <SocialHome/>
                    </div>
                )}

                {tab==='Alerts' && (
                    <div className="page-in">
                        <div className="page-head">
                            <h1 className="page-h1">{t('nav_alerts')}</h1>
                            <p className="page-sub">{t('alerts_sub')}</p>
                        </div>
                        {alertMatches.length > 0
                            ? alertMatches.map(m => {
                                const k = fid(m) || `${m.home?.name}${m.away?.name}${m.status}`;
                                return (
                                    <div key={k}>
                                        <LazySlot minHeight={175}>
                                            <MatchCard
                                                match={m}
                                                pred={matchToPred(m)}
                                                onOpen={openDetail}
                                                onToggleFav={toggleFav}
                                                isFav={favs.includes(fid(m))}
                                            />
                                        </LazySlot>
                                        <OddsCard match={m}/>
                                    </div>
                                );
                            })
                            : <EmptyState title={t('empty_tab')}/>
                        }
                        <Social/>
                    </div>
                )}

                {tab==='Favs' && (
                    <div className="page-in">
                        <div className="page-head">
                            <h1 className="page-h1">{t('nav_saved')}</h1>
                            <p className="page-sub">{t('saved_sub')}</p>
                        </div>
                        {savedMatches.length > 0
                            ? savedMatches.map(renderCard)
                            : (
                                <div style={{paddingTop:56,textAlign:'center'}}>
                                    <div style={{fontSize:36,color:'var(--sep2)',marginBottom:10}}>♡</div>
                                    <div style={{fontSize:14,fontWeight:600,color:'var(--t2)'}}>{t('nothing_saved')}</div>
                                    <div style={{fontSize:12,color:'var(--t3)',marginTop:3}}>{t('nothing_saved_sub')}</div>
                                </div>
                            )
                        }
                        <Social/>
                    </div>
                )}

                {tab==='More' && (
                    <div className="page-in">
                        <div className="page-head"><h1 className="page-h1">{t('nav_more')}</h1></div>
                        <div className="settings-group">
                            {[
                                ['about_us','https://docs.google.com/document/d/1OaaYhaQi3FZzog6YLIoojh3CnX3aN0lrizXyQ5N9Dkw/edit?usp=sharing'],
                                ['terms','https://docs.google.com/document/d/1wO92_LRf7q1vS90SdmHgArGITPkimnMa7g_U_VHFZo4/edit?usp=sharing'],
                                ['privacy','https://docs.google.com/document/d/1qrcuBqJ3RoSTTdjtyHJXidpVNODILbHW5cLx4wlAe6Y/edit?usp=sharing'],
                            ].map(([l,u]) => (
                                <a key={l} href={u} target="_blank" rel="noopener noreferrer" className="settings-item">{t(l)}<IcoChev/></a>
                            ))}
                            <a href="mailto:Magicbetingtips@gmail.com" className="settings-item">
                                <span style={{display:'flex',alignItems:'center',gap:10}}><IcoMail/> {t('contact_us')}</span>
                                <span style={{fontSize:12,color:'var(--t3)'}}>Magicbetingtips@gmail.com</span>
                            </a>
                        </div>
                        <div style={{textAlign:'center',paddingTop:8}}>
                            <div style={{fontSize:12,color:'var(--t3)'}}>Magic Analysis · v2.9</div>
                        </div>
                        <Social/>
                    </div>
                )}
            </main>

            {calOpen && (
                <div className="center-overlay" onClick={()=>setCalOpen(false)}>
                    <div className="center-card" onClick={e=>e.stopPropagation()}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
                            <div>
                                <div style={{fontSize:19,fontWeight:700,letterSpacing:'-.4px',marginBottom:2}}>{t('pick_date')}</div>
                                <div style={{fontSize:12,color:'var(--t3)'}}>{t('pick_date_sub')}</div>
                            </div>
                            <button onClick={()=>setCalOpen(false)} style={{background:'var(--bg)',border:'none',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:16,color:'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                        </div>
                        <div className="cal-days">
                            {dateStrip.map(d => (
                                <div key={d.iso}
                                    className={`cal-day${selectedDate === d.iso ? ' on' : ''}${d.isToday ? ' cal-day-today' : ''}`}
                                    onClick={() => pickDate(d.iso)}>
                                    <span className="cal-dd">{d.isToday ? t('stat_today') : d.weekday}</span>
                                    <span className="cal-dn">{d.day}</span>
                                    {d.count > 0 && <span className="cal-day-cnt">{d.count}</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {csSport && (
                <div className="center-overlay" onClick={()=>setCsSport(null)}>
                    <div className="center-card" style={{textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                        <div style={{fontSize:38,marginBottom:14}}>🔜</div>
                        <div style={{fontSize:21,fontWeight:700,letterSpacing:'-.4px',marginBottom:8}}>{t('coming_soon')}</div>
                        <div style={{fontSize:14,color:'var(--t2)',lineHeight:1.55,marginBottom:26}}>{t('coming_soon_body', {sport: csSport})}</div>
                        <button className="btn-primary" onClick={()=>setCsSport(null)}>{t('got_it')}</button>
                    </div>
                </div>
            )}

            {langOpen && (
                <div className="center-overlay" onClick={()=>setLangOpen(false)}>
                    <div className="center-card" onClick={e=>e.stopPropagation()}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                            <div style={{fontSize:19,fontWeight:700,letterSpacing:'-.4px'}}>{t('choose_language')}</div>
                            <button onClick={()=>setLangOpen(false)} style={{background:'var(--bg)',border:'none',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:16,color:'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:8}}>
                            {LANGS.map(([code,label,flag])=>(
                                <button key={code} onClick={()=>{setLang(code);setLangOpen(false);}}
                                    style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderRadius:12,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:15,fontWeight:600,
                                        background: code===lang ? 'var(--blue)' : 'var(--bg)', color: code===lang ? '#fff' : 'var(--t1)'}}>
                                    <span style={{fontSize:22,lineHeight:1}}>{flag}</span>
                                    <span style={{flex:1,textAlign:'start'}}>{label}</span>
                                    {code===lang && <span>✓</span>}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {detailMatch && (
                <DetailSheet
                    match={detailMatch}
                    pred={matchToPred(detailMatch)}
                    onClose={()=>setDetailMatch(null)}
                />
            )}

            <nav className="nav">
                {[{id:'Home',lbl:'nav_home',ico:<IcoHome/>},{id:'Alerts',lbl:'nav_alerts',ico:<IcoBell/>},{id:'Favs',lbl:'nav_saved',ico:<IcoHeart on={false}/>},{id:'More',lbl:'nav_more',ico:<IcoMenu/>}].map(({id,lbl,ico}) => (
                    <div key={id} className={`nav-item ${tab===id?'on':'off'}`} onClick={()=>setTab(id)}>
                        <div className="nav-ico">{ico}</div>
                        <span className="nav-lbl">{t(lbl)}</span>
                    </div>
                ))}
            </nav>
        </>
        </LangContext.Provider>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
