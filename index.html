<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Analysis</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        :root {
            --bg:#F5F5F7; --surface:#FFFFFF;
            --t1:#1D1D1F; --t2:#6E6E73; --t3:#86868B;
            --sep:rgba(0,0,0,0.08); --sep2:rgba(0,0,0,0.14);
            --live:#FF3B30; --blue:#007AFF;
            --r:16px; --r2:24px;
            --card-shadow:0 1px 1px rgba(0,0,0,0.04),0 2px 8px rgba(0,0,0,0.05),0 0 0 0.5px rgba(0,0,0,0.05);
            --modal-shadow:0 24px 64px rgba(0,0,0,0.22);
        }
        body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif; background:var(--bg); color:var(--t1); overflow-x:hidden; }
        ::-webkit-scrollbar { display:none; } * { scrollbar-width:none; }

        /* Header */
        .hdr { position:sticky; top:0; z-index:100; height:56px; background:rgba(255,255,255,0.88); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%); border-bottom:0.5px solid var(--sep); display:flex; align-items:center; padding:0 16px; }
        .hdr-btn { width:34px; height:34px; border-radius:50%; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--t1); transition:background .15s; flex-shrink:0; }
        .hdr-btn:hover { background:rgba(0,0,0,0.06); }
        .hdr-center { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; }
        .hdr-title { font-size:16px; font-weight:600; letter-spacing:-.3px; }

        /* Sport tabs */
        .tabs-bar { background:var(--surface); border-bottom:0.5px solid var(--sep); padding:10px 14px; display:flex; gap:7px; overflow-x:auto; }
        .tab { padding:6px 15px; border-radius:100px; font-size:14px; font-weight:500; letter-spacing:-.2px; border:none; cursor:pointer; white-space:nowrap; transition:all .2s; }
        .tab-on { background:var(--t1); color:#fff; transform:scale(1.02); }
        .tab-off { background:var(--bg); color:var(--t2); }
        .tab-off:hover { background:#E8E8ED; }

        /* Refresh toast */
        .toast {
            position:fixed; top:68px; left:50%; transform:translateX(-50%);
            background:var(--t1); color:#fff;
            padding:10px 18px; border-radius:100px;
            display:flex; align-items:center; gap:9px;
            font-size:13px; font-weight:600; letter-spacing:-.1px;
            z-index:150; pointer-events:none; white-space:nowrap;
            box-shadow:0 4px 24px rgba(0,0,0,0.22);
            animation:toastAnim 3s ease forwards;
        }
        @keyframes toastAnim {
            0%   { opacity:0; transform:translateX(-50%) translateY(-16px); }
            12%  { opacity:1; transform:translateX(-50%) translateY(0); }
            78%  { opacity:1; transform:translateX(-50%) translateY(0); }
            100% { opacity:0; transform:translateX(-50%) translateY(-10px); }
        }

        /* Page */
        .page { max-width:640px; margin:0 auto; padding:0 14px 110px; }
        .page-in { animation:pgIn .3s ease forwards; }
        @keyframes pgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .page-head { padding:26px 0 20px; }
        .page-h1 { font-size:30px; font-weight:700; letter-spacing:-.6px; line-height:1; margin-bottom:4px; }
        .page-sub { font-size:13px; color:var(--t3); }

        /* Stats */
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:28px; }
        .stat { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); padding:14px 10px; text-align:center; }
        .stat-n { font-size:22px; font-weight:700; letter-spacing:-.5px; line-height:1; margin-bottom:3px; }
        .stat-l { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }

        /* Group */
        .grp { display:flex; align-items:center; gap:10px; margin:24px 0 10px; }
        .grp-line { flex:1; height:.5px; background:var(--sep2); }
        .grp-txt { font-size:11px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }

        /* Card */
        .card { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); margin-bottom:9px; overflow:hidden; cursor:pointer; transition:transform .14s,box-shadow .14s; -webkit-tap-highlight-color:transparent; }
        .card:active { transform:scale(.984); }
        .card:hover { box-shadow:0 4px 22px rgba(0,0,0,0.1),0 0 0 0.5px rgba(0,0,0,0.05); }
        .card-inner { padding:13px 15px 11px; }
        .card-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
        .card-league { font-size:11px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
        .fav { background:none; border:none; cursor:pointer; padding:2px; color:var(--sep2); transition:color .15s,transform .2s cubic-bezier(.34,1.56,.64,1); line-height:0; flex-shrink:0; }
        .fav:hover { transform:scale(1.25); }
        .fav.on { color:var(--live); }

        /* Card body: optional logo + names + scores */
        .card-body { display:flex; align-items:stretch; gap:10px; }
        .card-logo-col { display:flex; flex-direction:column; gap:5px; justify-content:center; width:28px; flex-shrink:0; }
        .team-logo-sm { width:24px; height:24px; object-fit:contain; border-radius:4px; }
        .team-logo-ph { width:24px; height:24px; background:var(--bg); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--t3); font-weight:700; }
        .card-teams { flex:1; display:flex; flex-direction:column; gap:5px; min-width:0; }
        .team-nm { font-size:15px; font-weight:600; letter-spacing:-.2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .card-scores { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; min-width:22px; }
        .score-n { font-size:15px; font-weight:700; letter-spacing:-.2px; }
        .score-n.dim { color:var(--t3); font-weight:400; }

        /* Card footer with status badge */
        .card-foot { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:9px; border-top:.5px solid var(--sep); }
        .s-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:3px 9px; border-radius:100px; letter-spacing:.3px; text-transform:uppercase; }
        .s-live { background:rgba(255,59,48,.12); color:var(--live); }
        .s-fin  { background:rgba(0,0,0,.05); color:var(--t3); }
        .s-upc  { background:rgba(0,122,255,.1); color:var(--blue); }
        .s-canc { background:rgba(0,0,0,.05); color:var(--t3); }
        .dot { width:5px; height:5px; border-radius:50%; background:var(--live); animation:blink 1.6s ease-in-out infinite; flex-shrink:0; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

        .info-pill { font-size:11px; font-weight:600; color:var(--t2); background:var(--bg); border:none; border-radius:100px; padding:4px 10px; cursor:pointer; transition:background .15s,color .15s; display:flex; align-items:center; gap:4px; }
        .info-pill:hover { background:var(--t1); color:#fff; }

        /* Banners */
        .err-bar { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); border-left:3px solid var(--live); padding:13px 14px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
        .err-txt { flex:1; font-size:13px; font-weight:500; }
        .retry-btn { font-size:11px; font-weight:700; background:var(--bg); border:none; border-radius:100px; padding:5px 12px; cursor:pointer; flex-shrink:0; }
        .wake-bar { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); padding:13px 14px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
        .alert-bar { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); border-left:2px solid #FF9F0A; padding:11px 13px; display:flex; align-items:center; gap:9px; margin-bottom:12px; }
        .x-btn { background:none; border:none; cursor:pointer; color:var(--t3); font-size:17px; line-height:1; }

        /* Skeleton */
        .skel-card { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); padding:14px 15px; margin-bottom:9px; display:flex; flex-direction:column; gap:9px; }
        .skel { background:linear-gradient(90deg,var(--bg) 25%,#E8E8ED 50%,var(--bg) 75%); background-size:200% 100%; animation:shim 1.4s infinite; border-radius:5px; }
        @keyframes shim { from{background-position:200% 0} to{background-position:-200% 0} }

        /* Bottom nav */
        .nav { position:fixed; bottom:0; left:0; right:0; height:80px; background:rgba(255,255,255,0.9); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%); border-top:.5px solid var(--sep); display:flex; align-items:flex-start; justify-content:space-around; padding-top:11px; z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; min-width:56px; -webkit-tap-highlight-color:transparent; }
        .nav-ico { width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
        .nav-lbl { font-size:10px; font-weight:500; letter-spacing:.1px; }
        .nav-item.on .nav-ico, .nav-item.on .nav-lbl { color:var(--t1); }
        .nav-item.off .nav-ico, .nav-item.off .nav-lbl { color:#C7C7CC; }
        .nav-item.on .nav-lbl { font-weight:600; }

        /* Overlay / Sheet */
        .overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.48); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:flex; align-items:flex-end; justify-content:center; }
        .sheet { background:var(--surface); border-radius:var(--r2) var(--r2) 0 0; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; padding:10px 22px 44px; animation:sheetUp .38s cubic-bezier(.32,.72,0,1) forwards; }
        @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .handle { width:34px; height:4px; background:var(--sep2); border-radius:2px; margin:0 auto 18px; }

        /* Detail sheet */
        .detail-head { text-align:center; margin-bottom:20px; }
        .detail-league { font-size:11px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
        .detail-teams { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; }
        .detail-team { flex:1; text-align:center; }
        .detail-logo { width:64px; height:64px; object-fit:contain; margin:0 auto 8px; display:block; }
        .detail-logo-ph { width:64px; height:64px; background:var(--bg); border-radius:16px; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:var(--t2); }
        .detail-logo-loading { width:64px; height:64px; background:linear-gradient(90deg,var(--bg) 25%,#E8E8ED 50%,var(--bg) 75%); background-size:200% 100%; animation:shim 1.4s infinite; border-radius:16px; margin:0 auto 8px; }
        .detail-team-nm { font-size:13px; font-weight:600; letter-spacing:-.1px; }
        .detail-vs { font-size:12px; color:var(--t3); font-weight:600; flex-shrink:0; }

        .detail-score-box { background:var(--t1); border-radius:var(--r); padding:18px 20px; margin-bottom:14px; text-align:center; }
        .detail-score-big { font-size:40px; font-weight:700; color:#fff; letter-spacing:-1px; line-height:1; margin-bottom:6px; }
        .detail-score-sub { font-size:12px; color:rgba(255,255,255,.5); font-weight:500; }

        .detail-status-row { display:flex; justify-content:center; margin-bottom:16px; }

        .detail-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
        .detail-info-cell { background:var(--bg); border-radius:12px; padding:12px; text-align:center; }
        .detail-info-val { font-size:15px; font-weight:700; letter-spacing:-.2px; margin-bottom:2px; }
        .detail-info-lbl { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }

        /* Events */
        .events-title { font-size:12px; font-weight:600; color:var(--t2); margin-bottom:10px; letter-spacing:-.1px; }
        .event-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:.5px solid var(--sep); }
        .event-row:last-child { border-bottom:none; }
        .event-min { font-size:11px; font-weight:700; color:var(--t2); width:28px; flex-shrink:0; }
        .event-ico { font-size:14px; flex-shrink:0; width:18px; text-align:center; }
        .event-player { font-size:13px; font-weight:500; color:var(--t1); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .event-team { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.2px; flex-shrink:0; }

        /* AI Analysis */
        .ai-analysis-box { background:var(--bg); border-radius:var(--r); padding:14px 16px; margin-bottom:14px; }
        .ai-analysis-lbl { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.4px; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
        .ai-analysis-txt { font-size:14px; color:var(--t1); line-height:1.55; font-weight:400; }
        .ai-analysis-loading { display:flex; align-items:center; gap:8px; padding:2px 0; }
        .ai-analysis-loading-txt { font-size:12px; color:var(--t3); }

        /* Prediction outcome circle (Forebet-style) */
        .pred-outcome-wrap { text-align:center; margin-bottom:20px; }
        .pred-outcome-circle { width:80px; height:80px; border-radius:50%; background:#FF9500; display:inline-flex; align-items:center; justify-content:center; margin-bottom:8px; box-shadow:0 4px 20px rgba(255,149,0,.35); }
        .pred-outcome-code { font-size:36px; font-weight:800; color:#fff; letter-spacing:-1px; line-height:1; }
        .pred-outcome-label { font-size:13px; font-weight:700; color:var(--t1); margin-bottom:4px; }
        .pred-outcome-score { font-size:26px; font-weight:700; color:var(--t1); letter-spacing:-.5px; }
        .pred-outcome-score-lbl { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
        .pred-prob-row { display:flex; gap:8px; margin-bottom:16px; }
        .pred-prob-cell { flex:1; background:var(--bg); border-radius:12px; padding:10px 6px; text-align:center; }
        .pred-prob-val { font-size:17px; font-weight:700; letter-spacing:-.3px; }
        .pred-prob-lbl { font-size:9px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
        /* Small card prediction badge */
        .card-pred-badge { font-size:11px; font-weight:800; padding:2px 8px; border-radius:100px; background:#FF9500; color:#fff; letter-spacing:.2px; }

        /* Prediction sheet (same as before) */
        .pred-league-row { text-align:center; margin-bottom:20px; }
        .pred-league-nm { font-size:12px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:.5px; }
        .pred-badge { display:inline-block; font-size:10px; font-weight:600; color:var(--t3); background:var(--bg); padding:3px 9px; border-radius:100px; margin-top:5px; }
        .pred-teams { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; gap:12px; }
        .pred-team { flex:1; text-align:center; }
        .pred-logo { width:56px; height:56px; object-fit:contain; margin:0 auto 7px; display:block; }
        .pred-team-nm { font-size:12px; font-weight:600; letter-spacing:-.1px; }
        .pred-vs { font-size:12px; font-weight:600; color:var(--t3); flex-shrink:0; }
        .pred-box { background:var(--t1); border-radius:var(--r); padding:18px; margin-bottom:20px; }
        .pred-advice { font-size:19px; font-weight:700; color:#fff; letter-spacing:-.4px; text-align:center; margin-bottom:14px; line-height:1.3; }
        .pred-bar { height:3px; background:rgba(255,255,255,.15); border-radius:2px; overflow:hidden; display:flex; margin-bottom:9px; }
        .pb-h{background:#fff} .pb-d{background:rgba(255,255,255,.4)} .pb-a{background:rgba(255,255,255,.7)}
        .pred-pct { display:flex; justify-content:space-between; font-size:10px; font-weight:600; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:.3px; }
        .cmp-row { margin-bottom:12px; }
        .cmp-labels { display:flex; justify-content:space-between; margin-bottom:5px; }
        .cmp-val { font-size:11px; font-weight:600; }
        .cmp-name { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }
        .cmp-track { height:2px; background:var(--bg); border-radius:1px; overflow:hidden; }
        .cmp-fill { height:100%; background:var(--t1); }

        /* Loading overlay */
        .pred-loading { position:fixed; inset:0; z-index:210; background:rgba(255,255,255,.65); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; }
        .pred-loading-box { background:var(--surface); border-radius:var(--r2); box-shadow:var(--modal-shadow); padding:28px 36px; display:flex; flex-direction:column; align-items:center; gap:12px; }
        .pred-loading-txt { font-size:12px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:.3px; }
        .spin { width:22px; height:22px; border:2px solid var(--sep2); border-top-color:var(--t1); border-radius:50%; animation:rot .7s linear infinite; }
        .spin-sm { width:14px; height:14px; border:1.5px solid var(--sep2); border-top-color:var(--blue); border-radius:50%; animation:rot .7s linear infinite; }
        @keyframes rot { to{transform:rotate(360deg)} }

        /* Center modal */
        .center-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.46); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; padding:20px; }
        .center-card { background:var(--surface); border-radius:var(--r2); width:100%; max-width:340px; padding:32px 26px; box-shadow:var(--modal-shadow); animation:pop .28s cubic-bezier(.34,1.56,.64,1); }
        @keyframes pop { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }

        /* Settings */
        .settings-group { background:var(--surface); border-radius:var(--r); box-shadow:var(--card-shadow); overflow:hidden; margin-bottom:18px; }
        .settings-item { display:flex; align-items:center; justify-content:space-between; padding:15px 16px; text-decoration:none; color:var(--t1); font-size:15px; font-weight:500; letter-spacing:-.2px; border-bottom:.5px solid var(--sep); transition:background .1s; }
        .settings-item:last-child { border-bottom:none; }
        .settings-item:hover { background:var(--bg); }

        /* Calendar */
        .cal-days { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
        .cal-day { display:flex; flex-direction:column; align-items:center; padding:9px 5px; border-radius:11px; cursor:pointer; transition:background .15s; }
        .cal-day.on { background:var(--t1); }
        .cal-day.on .cal-dd,.cal-day.on .cal-dn { color:#fff; }
        .cal-day:not(.on):hover { background:var(--bg); }
        .cal-dd { font-size:9px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; margin-bottom:3px; }
        .cal-dn { font-size:16px; font-weight:700; color:var(--t1); letter-spacing:-.3px; }
        .cal-day.on .cal-dd { color:rgba(255,255,255,.65); }

        /* Social */
        .social { padding:36px 0 16px; text-align:center; }
        .social-lbl { font-size:10px; font-weight:500; color:var(--t3); text-transform:uppercase; letter-spacing:.5px; margin-bottom:18px; }
        .social-row { display:flex; justify-content:center; gap:14px; }
        .social-ico { width:42px; height:42px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--t1); text-decoration:none; transition:background .15s,transform .18s; }
        .social-ico:hover { background:var(--t1); color:#fff; transform:translateY(-2px); }

        /* Notif */
        .notif-card { animation:notifDrop .55s cubic-bezier(.175,.885,.32,1.275) both; }
        @keyframes notifDrop { from{transform:translateY(-20px);opacity:0} to{transform:translateY(0);opacity:1} }
        .opacity-0 { opacity:0; } .anim-fill { animation-fill-mode:forwards; }

        /* Buttons */
        .btn-primary { width:100%; background:var(--t1); color:#fff; border:none; border-radius:var(--r); padding:14px; font-weight:700; font-size:15px; cursor:pointer; letter-spacing:-.2px; }
        .btn-secondary { width:100%; background:var(--bg); color:var(--t1); border:none; border-radius:var(--r); padding:14px; font-weight:600; font-size:15px; cursor:pointer; letter-spacing:-.2px; }

        /* Splash */
        .splash { position:fixed; inset:0; z-index:300; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; animation:splFade .5s ease forwards; animation-delay:2.6s; pointer-events:none; }
        @keyframes splFade { to{opacity:0} }
        .splash-inner { animation:splPop .55s cubic-bezier(.34,1.56,.64,1) forwards; display:flex; flex-direction:column; align-items:center; gap:14px; }
        @keyframes splPop { from{opacity:0;transform:scale(.82)} to{opacity:1;transform:scale(1)} }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const BACKEND_URL = "https://sportprediction.onrender.com";

/* ── Status helpers ── */
/* ── Forebet-style outcome helper ── */
const getPredOutcome = pct => {
    const h = parseInt(pct?.home) || 0;
    const d = parseInt(pct?.draw) || 0;
    const a = parseInt(pct?.away) || 0;
    if (h >= d && h >= a) return { code: '1', label: 'Home Win' };
    if (a > h  && a >= d) return { code: '2', label: 'Away Win' };
    return { code: 'X', label: 'Draw' };
};

const FIN  = ['FT','AET','PEN','Pen.'];
const CANC = ['Postp.','Canc.','Susp.','WO','AWD','ABD'];
const UPC  = ['NS','TBD'];
const TIME_RE     = /^\d{2}:\d{2}$/;
const FT_SCORE_RE = /\[(\d+)-(\d+)\]/;

const cat = s => {
    if (!s) return 'unknown';
    if (FIN.includes(s))  return 'finished';
    if (CANC.includes(s)) return 'cancelled';
    if (UPC.includes(s))  return 'upcoming';
    if (TIME_RE.test(s))  return 'upcoming';
    return 'live';
};

const statusLabel = s => {
    if (!s) return '';
    if (s === 'HT')  return 'Half Time';
    if (s === 'FT')  return 'Full Time';
    if (s === 'AET') return 'AET';
    if (s === 'PEN' || s === 'Pen.') return 'Penalties';
    if (s === 'ET')  return 'Extra Time';
    if (s === 'BT')  return 'Break';
    if (TIME_RE.test(s)) return s;
    const n = parseInt(s);
    if (!isNaN(n)) return `${n}'`;
    return s;
};

const statusBadgeLabel = (s, c) => {
    if (c === 'live')     return `LIVE  ${statusLabel(s)}`;
    if (c === 'finished') return statusLabel(s) || 'Full Time';
    if (c === 'upcoming') return `KO  ${statusLabel(s)}`;
    if (c === 'cancelled') return statusLabel(s) || 'Cancelled';
    return statusLabel(s);
};

const getGoals = m => {
    const c = cat(m.status);
    if (c === 'finished') {
        const raw = m.ft?.score;
        if (raw) { const x = FT_SCORE_RE.exec(raw); if (x) return { h:x[1], a:x[2] }; }
    }
    const h = m.home?.goals, a = m.away?.goals;
    if (h == null || h === '?' || a == null || a === '?') return null;
    return { h:String(h), a:String(a) };
};

const fid = m => m?.static_id || m?.id || m?.fixture?.id || null;

const parseEvents = m => {
    try {
        const ev = m.events?.event;
        if (!ev) return [];
        const arr = Array.isArray(ev) ? ev : [ev];
        return arr.filter(e => e && (e.type || e.minute)).map(e => ({
            minute: e.minute || e.min || '',
            type:   (e.type || '').toLowerCase(),
            player: e.player || e.Player || '',
            assist: e.assist || '',
            team:   e.team || e.Team || '',
        }));
    } catch { return []; }
};

const eventIcon = t => {
    if (t.includes('goal') || t === 'g') return '⚽';
    if (t.includes('yellow')) return '🟨';
    if (t.includes('red'))    return '🟥';
    if (t.includes('sub'))    return '🔄';
    if (t.includes('var'))    return '📺';
    return '•';
};

/* ── Logo component with fallback ── */
const TeamLogo = ({ url, name, size=64, small=false }) => {
    const [err, setErr] = useState(false);
    const initials = (name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    if (!url || err) {
        if (small) return <div className="team-logo-ph">{initials}</div>;
        return <div className="detail-logo-ph" style={{width:size,height:size}}>{initials}</div>;
    }
    if (small) return <img className="team-logo-sm" src={url} alt={name} onError={()=>setErr(true)}/>;
    return <img className="detail-logo" src={url} style={{width:size,height:size}} alt={name} onError={()=>setErr(true)}/>;
};

/* ── Match Card ── */
const MatchCard = ({ match, onOpen, onToggleFav, isFav, logos={}, pred=null, isNotif=false, idx=0 }) => {
    const c   = cat(match.status);
    const g   = getGoals(match);
    const id  = fid(match);
    const badgeClass = c==='live'?'s-live':c==='finished'?'s-fin':c==='upcoming'?'s-upc':'s-canc';

    return (
        <div
            className={`card${isNotif?' notif-card opacity-0 anim-fill':''}`}
            style={{animationDelay:isNotif?`${idx*3}s`:'0s'}}
            onClick={()=>onOpen(match)}
        >
            <div className="card-inner">
                <div className="card-meta">
                    <span className="card-league">{(match.country||'').toUpperCase()}{match.country&&match.leagueName?' · ':''}{match.leagueName||''}</span>

                        <IcoHeart on={isFav}/>

                </div>
                <div className="card-body">
                    {/* Small logos if available */}
                    <div className="card-logo-col">
                        <TeamLogo url={logos[match.home?.name]} name={match.home?.name} small/>
                        <TeamLogo url={logos[match.away?.name]} name={match.away?.name} small/>

                        <span className="team-nm">{match.home?.name||'—'}</span>
                        <span className="team-nm">{match.away?.name||'—'}</span>
                    </div>

                        {g

                    <span className={`s-badge ${badgeClass}`}>
                        {c==='live' && <span className="dot"/>}
                        {statusBadgeLabel(match.status, c)}

                    <div style={{display:'flex',alignItems:'center',gap:7}}>

                            <span className="card-pred-badge" title={pred.score?`Predicted: ${pred.score}`:undefined}>

};

/* ── Detail Sheet ── */

    const events = parseEvents(match);

    const badgeClass = c==='live'?'s-live':c==='finished'?'s-fin':c==='upcoming'?'s-upc':'s-canc';

    return (
        <div className="overlay" onClick={onClose}>
            <div className="sheet" onClick={e=>e.stopPropagation()}>
                <div className="handle"/>

                {/* League */}
                <div className="detail-head">
                    <div className="detail-league">{match.country} · {match.leagueName}</div>
                </div>

                {/* Teams */}
                <div className="detail-teams">
                    <div className="detail-team">
                        {logos.homeLoading
                            ? <div className="detail-logo-loading"/>
                            : <TeamLogo url={logos.home} name={match.home?.name} size={64}/>
                        }
                        <div className="detail-team-nm">{match.home?.name}</div>
                    </div>
                    <div className="detail-vs">vs</div>
                    <div className="detail-team">
                        {logos.awayLoading
                            ? <div className="detail-logo-loading"/>
                            : <TeamLogo url={logos.away} name={match.away?.name} size={64}/>
                        }

                    </div>
                </div>

                {/* Score box */}
                <div className="detail-score-box">
                    <div className="detail-score-big">
                        {g ? `${g.h}  —  ${g.a}` : '—  vs  —'}
                    </div>
                    {htScore && <div className="detail-score-sub">Half time: {htScore}</div>}
                    {!htScore && c==='upcoming' && <div className="detail-score-sub">Match not started yet</div>}
                </div>

                {/* Status badge */}
                <div className="detail-status-row">
                    <span className={`s-badge ${badgeClass}`} style={{fontSize:12,padding:'5px 14px'}}>
                        {c==='live' && <span className="dot"/>}
                        {statusBadgeLabel(match.status, c)}
                    </span>
                </div>

                {/* Info grid */}
                <div className="detail-info-grid">
                    <div className="detail-info-cell">
                        <div className="detail-info-val">{match.leagueName||'—'}</div>
                        <div className="detail-info-lbl">Competition</div>
                    </div>
                    <div className="detail-info-cell">
                        <div className="detail-info-val">{match.country||'—'}</div>
                        <div className="detail-info-lbl">Country</div>
                    </div>
                    {match.time && (
                        <div className="detail-info-cell">
                            <div className="detail-info-val">{match.time}</div>
                            <div className="detail-info-lbl">Kick-off (UTC)</div>

                    )}

                {/* AI Analysis */}
                <div className="ai-analysis-box">
                    <div className="ai-analysis-lbl"><IcoStar/> AI Match Analysis</div>
                    {analysisLoading
                        ? <div className="ai-analysis-loading"><div className="spin-sm"/><span className="ai-analysis-loading-txt">Generating analysis…</span></div>

                </div>

                {/* Events */}
                {events.length > 0 && (
                    <div style={{marginBottom:16}}>
                        <div className="events-title">Match Events</div>
                        {events.slice(0,12).map((e,i) => (

                                <span className="event-player">{e.player||'—'}{e.assist?` (${e.assist})`:''}</span>
                                <span className="event-team">{e.team}</span>
                            </div>
                        ))}
                    </div>
                )}

                {/* Prediction CTA */}
                {fid(match) && (
                    <button className="btn-primary" style={{marginBottom:10}} onClick={onGetPrediction}>
                        Get AI Prediction

                <button className="btn-secondary" onClick={onClose}>Close</button>

/* ── Prediction Sheet ── */

    const { predictions, teams, comparison, league } = data;
    if (!predictions || !teams || !league) return (
        <div className="overlay" onClick={onClose}>
            <div className="sheet" onClick={e=>e.stopPropagation()}>
                <div className="handle"/>
                <p style={{textAlign:'center',color:'var(--t3)',fontSize:14,padding:'20px 0'}}>No prediction data for this match.</p>
                <button className="btn-primary" onClick={onClose}>Close</button>
            </div>
        </div>
    );

    const outcome    = getPredOutcome(predictions.percent);
    const predScore  = (predictions.goals?.home != null && predictions.goals?.away != null)
        ? `${predictions.goals.home} - ${predictions.goals.away}` : null;

    return (
        <div className="overlay" onClick={onClose}>
            <div className="sheet" onClick={e=>e.stopPropagation()}>
                <div className="handle"/>

                {/* League */}
                <div className="pred-league-row">
                    <img src={league.logo} width={32} height={32} style={{objectFit:'contain',margin:'0 auto 5px',display:'block'}} onError={e=>e.target.style.display='none'} alt=""/>
                    <div className="pred-league-nm">{league.name}</div>
                </div>

                {/* Teams */}
                <div className="pred-teams">
                    <div className="pred-team">
                        <img src={teams.home?.logo} className="pred-logo" onError={e=>e.target.style.display='none'} alt=""/>
                        <div className="pred-team-nm">{teams.home?.name}</div>
                    </div>
                    <div className="pred-vs">vs</div>
                    <div className="pred-team">
                        <img src={teams.away?.logo} className="pred-logo" onError={e=>e.target.style.display='none'} alt=""/>
                        <div className="pred-team-nm">{teams.away?.name}</div>
                    </div>
                </div>

                {/* ── Forebet-style outcome circle ── */}
                <div className="pred-outcome-wrap">
                    <div><div className="pred-outcome-circle"><span className="pred-outcome-code">{outcome.code}</span></div></div>
                    <div className="pred-outcome-label">{outcome.label}</div>
                    {predScore && <>
                        <div className="pred-outcome-score">{predScore}</div>
                        <div className="pred-outcome-score-lbl">Predicted Score</div>
                    </>}
                </div>

                {/* ── Probability table (1 / X / 2) ── */}
                <div className="pred-prob-row">
                    {[['1','Home Win',predictions.percent?.home],['X','Draw',predictions.percent?.draw],['2','Away Win',predictions.percent?.away]].map(([code,lbl,pct])=>(
                        <div key={code} className="pred-prob-cell" style={outcome.code===code?{background:'rgba(255,149,0,.12)',outline:'1.5px solid #FF9500'}:{}}>
                            <div className="pred-prob-val" style={outcome.code===code?{color:'#FF9500'}:{}}>{pct||'—'}</div>
                            <div className="pred-prob-lbl">{lbl}</div>
                        </div>
                    ))}
                </div>

                {/* Advice box */}
                <div className="pred-box" style={{marginBottom:16}}>
                    <div className="pred-advice">{predictions.advice}</div>
                    <div className="pred-bar">
                        <div className="pb-h" style={{width:predictions.percent?.home}}/>
                        <div className="pb-d" style={{width:predictions.percent?.draw}}/>
                        <div className="pb-a" style={{width:predictions.percent?.away}}/>
                    </div>
                    <div className="pred-pct">
                        <span>1  {predictions.percent?.home}</span>
                        <span>X  {predictions.percent?.draw}</span>
                        <span>2  {predictions.percent?.away}</span>
                    </div>
                </div>

                {/* Team comparison */}
                {comparison && (
                    <div style={{marginBottom:16}}>
                        <div className="events-title">Team Comparison</div>
                        {[{n:'Attack',h:comparison.att?.home,a:comparison.att?.away},{n:'Defense',h:comparison.def?.home,a:comparison.def?.away},{n:'Form',h:comparison.form?.home,a:comparison.form?.away}].filter(r=>r.h).map(r=>(
                            <div key={r.n} className="cmp-row">
                                <div className="cmp-labels">
                                    <span className="cmp-val">{r.h}</span>
                                    <span className="cmp-name">{r.n}</span>
                                    <span className="cmp-val">{r.a}</span>
                                </div>
                                <div className="cmp-track"><div className="cmp-fill" style={{width:r.h}}/></div>
                            </div>
                        ))}
                    </div>
                )}

                <button className="btn-primary" onClick={onClose}>Close</button>
            </div>
        </div>
    );
};

/* ── Social ── */
const Social = () => (
    <div className="social">
        <div className="social-lbl">Follow Us</div>
        <div className="social-row">
            <a href="https://t.me/footballnisight" target="_blank" rel="noopener noreferrer" className="social-ico" title="Telegram"><IcoTG/></a>
            <a href="https://x.com/tipsmagic30849" target="_blank" rel="noopener noreferrer" className="social-ico" title="X / Twitter"><IcoX/></a>
            <a href="https://www.threads.com/@magicbetting" target="_blank" rel="noopener noreferrer" className="social-ico" title="Threads"><IcoThreads/></a>
            <a href="https://www.instagram.com/magicbetting" target="_blank" rel="noopener noreferrer" className="social-ico" title="Instagram"><IcoIG/></a>
        </div>
    </div>
);

const Grp = ({label}) => (
    <div className="grp"><div className="grp-line"/><span className="grp-txt">{label}</span><div className="grp-line"/></div>
);

/* ── App ── */
function App() {
    const [splash,      setSplash]      = useState(true);
    const [calOpen,     setCalOpen]     = useState(false);
    const [tab,         setTab]         = useState('Home');
    const [sport,       setSport]       = useState('Football');
    const [favs,        setFavs]        = useState([]);
    const [matches,     setMatches]     = useState([]);
    const [loading,     setLoading]     = useState(true);
    const [waking,      setWaking]      = useState(false);
    const [err,         setErr]         = useState(null);
    const [predErr,     setPredErr]     = useState(null);
    const [csSport,     setCsSport]     = useState(null);
    const [showToast,   setShowToast]   = useState(false);
    // Team logo cache: name → url
    const [logoCache,   setLogoCache]   = useState({});
    // Detail sheet state
    const [detailMatch, setDetailMatch] = useState(null);
    const [detailLogos, setDetailLogos] = useState({ home:null, away:null, homeLoading:false, awayLoading:false });
    const [analysis,    setAnalysis]    = useState(null);
    const [analysisLoading, setAnalysisLoading] = useState(false);
    // Prediction sheet
    const [pred,        setPred]        = useState(null);
    const [predLoad,    setPredLoad]    = useState(false);
    // Cache of outcome per fixture id: { [id]: { code:'1'|'2'|'X', score:'2-1' } }
    const [predCache,   setPredCache]   = useState({});

    /* ── Fetch scores ── */
    const load = useCallback(async (isManual=false) => {
        setLoading(true); setErr(null);
        setShowToast(true);
        setTimeout(() => setShowToast(false), 3000);
        const wt = setTimeout(() => setWaking(true), 4000);
        try {
            const ctrl = new AbortController();
            const tt   = setTimeout(()=>ctrl.abort(), 35000);
            const res  = await fetch(`${BACKEND_URL}/api/scores`,{signal:ctrl.signal});
            clearTimeout(tt); clearTimeout(wt); setWaking(false);
            if (!res.ok) throw new Error(`${res.status}`);
            const data = await res.json();
            if (data.livescore?.league) {
                const flat=[], leagues=Array.isArray(data.livescore.league)?data.livescore.league:[data.livescore.league];
                leagues.forEach(lg=>{
                    if(!lg.match)return;
                    const items=Array.isArray(lg.match)?lg.match:[lg.match];
                    items.forEach(m=>flat.push({...m,leagueName:lg.name,country:lg.country}));
                });
                setMatches(flat);
                // Pre-fetch logos for visible teams in background
                fetchLogosForMatches(flat.slice(0,30));
            } else throw new Error("Bad format");
        } catch(e) {
            clearTimeout(wt); setWaking(false);
            setErr(e.name==='AbortError'?"Server taking too long — retry in a moment.":"Could not load data. Check your connection.");
        } finally { setLoading(false); }
    }, []);

    /* ── Background logo pre-fetch for cards ── */
    const fetchLogosForMatches = useCallback(async (ms) => {
        const names = [...new Set(ms.flatMap(m=>[m.home?.name,m.away?.name].filter(Boolean)))];
        for (const name of names) {
            if (logoCache[name] !== undefined) continue;
            try {
                const res  = await fetch(`${BACKEND_URL}/api/team-logo?name=${encodeURIComponent(name)}`);
                const data = await res.json();
                setLogoCache(prev => ({...prev, [name]: data.logo || null}));
            } catch { setLogoCache(prev => ({...prev, [name]:null})); }
            await new Promise(r=>setTimeout(r,120)); // gentle rate-limit
        }
    }, [logoCache]);

    useEffect(() => {
        const t=setTimeout(()=>setSplash(false),3000);
        load();
        const iv=setInterval(()=>load(false), 60000);
        return ()=>{ clearTimeout(t); clearInterval(iv); };
    }, [load]);

    /* ── Open match detail ── */
    const openDetail = useCallback(async m => {
        setDetailMatch(m);
        setAnalysis(null);
        setDetailLogos({home:null,away:null,homeLoading:true,awayLoading:true});

        // Fetch logos
        const getLogo = async name => {
            if (logoCache[name] !== undefined) return logoCache[name];
            try {
                const res  = await fetch(`${BACKEND_URL}/api/team-logo?name=${encodeURIComponent(name)}`);
                const data = await res.json();
                return data.logo||null;
            } catch { return null; }
        };

        const [hl,al] = await Promise.all([getLogo(m.home?.name),getLogo(m.away?.name)]);
        setLogoCache(prev=>({...prev,[m.home?.name]:hl,[m.away?.name]:al}));
        setDetailLogos({home:hl,away:al,homeLoading:false,awayLoading:false});

        // Fetch AI analysis
        setAnalysisLoading(true);
        try {
            const g = getGoals(m);
            const p = new URLSearchParams({
                home:   m.home?.name||'',
                away:   m.away?.name||'',
                league: m.leagueName||'',
                status: statusLabel(m.status)||m.status||'',
                score:  g?`${g.h}-${g.a}`:'Not started',
                ht:     m.ht?.score||''
            });
            const res  = await fetch(`${BACKEND_URL}/api/match-analysis?${p}`);
            const data = await res.json();
            setAnalysis(data.analysis||null);
        } catch { setAnalysis(null); }
        finally { setAnalysisLoading(false); }
    }, [logoCache]);

    /* ── Get prediction ── */
    const fetchPred = useCallback(async m => {
        const id = fid(m);
        if (!id) { setPredErr("No fixture ID — prediction unavailable."); return; }
        setPredErr(null); setPredLoad(true);
        try {
            const res  = await fetch(`${BACKEND_URL}/api/get-predictions?fixture=${id}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            const p = data.response?.[0]||null;
            if (!p) throw new Error();
            // Cache the outcome so the match card can show the badge
            const outcome = getPredOutcome(p.predictions?.percent);
            const score   = (p.predictions?.goals?.home != null && p.predictions?.goals?.away != null)
                ? `${p.predictions.goals.home}-${p.predictions.goals.away}` : null;
            setPredCache(prev => ({...prev, [id]: { code: outcome.code, score }}));
            setDetailMatch(null);
            setPred(p);
        } catch { setPredErr("Prediction not available for this match."); }
        finally { setPredLoad(false); }
    }, []);

    const toggleFav = useCallback(id=>{
        if(!id)return;
        setFavs(p=>p.includes(id)?p.filter(f=>f!==id):[...p,id]);
    },[]);

    const live  = useMemo(()=>matches.filter(m=>cat(m.status)==='live').slice(0,20),    [matches]);
    const past  = useMemo(()=>matches.filter(m=>cat(m.status)==='finished').slice(0,20),[matches]);
    const upc   = useMemo(()=>matches.filter(m=>cat(m.status)==='upcoming').slice(0,20),[matches]);
    const saved = useMemo(()=>matches.filter(m=>favs.includes(fid(m))),                 [matches,favs]);
    const alerts= useMemo(()=>matches.filter(m=>{const n=parseInt(m.status);return !isNaN(n)&&n>=75&&n<120;}).slice(0,15),[matches]);

    const card = (m,extra={}) => (
        <MatchCard key={fid(m)||`${m.home?.name}${m.away?.name}${m.status}`}
            match={m} logos={logoCache}
            pred={predCache[fid(m)]||null}
            onOpen={openDetail} onToggleFav={toggleFav}
            isFav={favs.includes(fid(m))} {...extra}/>
    );

    const today  = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const sports = [['Football','⚽'],['Basketball','🏀'],['Tennis','🎾'],['Hockey','🏒'],['Baseball','⚾']];
    const calDays= () => {
        const t=new Date(),s=t.getDate()-t.getDay()+1;
        return Array.from({length:5},(_,i)=>{
            const d=new Date(t.getFullYear(),t.getMonth(),s+i);
            return {nm:d.toLocaleDateString('en-US',{weekday:'short'}),dn:d.getDate(),full:d.toDateString(),on:d.toDateString()===t.toDateString()};
        });
    };

    return (
        <>
            {/* Splash */}
            {splash && (
                <div className="splash">
                    <div className="splash-inner">
                        <div style={{width:76,height:76,background:'#fff',borderRadius:18,boxShadow:'0 8px 32px rgba(0,0,0,0.12)',display:'flex',alignItems:'center',justifyContent:'center',border:'.5px solid rgba(0,0,0,0.06)'}}>
                            <MagicLogo size={58}/>
                        </div>
                        <div style={{textAlign:'center'}}>
                            <div style={{fontSize:22,fontWeight:700,letterSpacing:'-.5px'}}>Magic Analysis</div>
                            <div style={{fontSize:13,color:'var(--t3)',marginTop:2}}>Live Football Intelligence</div>
                        </div>
                    </div>
                </div>
            )}

            {/* Refresh toast */}
            {showToast && (
                <div className="toast">
                    <div className="spin"/>
                    Fetching live info, please wait…
                </div>
            )}

            {/* Header */}
            <header className="hdr">
                <button className="hdr-btn" onClick={()=>setCalOpen(true)}><IcoCal/></button>
                <div className="hdr-center"><MagicLogo size={22}/><span className="hdr-title">Magic Analysis</span></div>
                <button className="hdr-btn" onClick={()=>load(true)}><IcoRef/></button>
            </header>

            {/* Tabs */}
            <div className="tabs-bar">
                {sports.map(([nm,ic])=>(
                    <button key={nm} className={`tab ${sport===nm?'tab-on':'tab-off'}`}
                        onClick={()=>nm==='Football'?setSport(nm):setCsSport(nm)}>
                        {ic} {nm}
                    </button>
                ))}
            </div>

            {/* Main */}
            <main className="page">
                {tab==='Home' && (
                    <div className="page-in">
                        <div className="page-head">
                            <h1 className="page-h1">Predictions</h1>
                            <p className="page-sub">{today}</p>
                        </div>
                        <div className="stats">
                            {[['Live',live.length],['Past',past.length],['Upcoming',upc.length],['Alerts',alerts.length]].map(([l,v])=>(
                                <div key={l} className="stat"><div className="stat-n">{v}</div><div className="stat-l">{l}</div></div>
                            ))}
                        </div>
                        {waking && <div className="wake-bar"><div className="spin" style={{flexShrink:0}}/><span style={{fontSize:13,fontWeight:500,color:'var(--t2)'}}>Waking up server — up to 30 s on first load…</span></div>}
                        {err&&!loading && <div className="err-bar"><span className="err-txt">{err}</span><button className="retry-btn" onClick={()=>load(true)}>Retry</button></div>}
                        {predErr && <div className="alert-bar"><span style={{flex:1,fontSize:13,fontWeight:500}}>{predErr}</span><button className="x-btn" onClick={()=>setPredErr(null)}>×</button></div>}

                        <Grp label="🔴 Live Now"/>
                        {loading?[1,2,3].map(i=><Skel key={i}/>):live.length>0?live.map(m=>card(m)):<div style={{background:'var(--surface)',borderRadius:'var(--r)',boxShadow:'var(--card-shadow)',padding:'32px 20px',textAlign:'center',marginBottom:9}}><div style={{fontSize:14,fontWeight:600,color:'var(--t2)'}}>No live matches right now</div><div style={{fontSize:12,color:'var(--t3)',marginTop:3}}>Live matches appear here automatically.</div></div>}

                        {!loading&&past.length>0&&<><Grp label="✅ Finished"/>{past.map(m=>card(m))}</>}
                        {!loading&&upc.length>0&&<><Grp label="🔵 Upcoming"/>{upc.map(m=>card(m))}</>}
                        <Social/>
                    </div>
                )}

                {tab==='Alerts' && (
                    <div className="page-in">
                        <div className="page-head"><h1 className="page-h1">Alerts</h1><p className="page-sub">Matches past the 75 minute mark</p></div>
                        {alerts.length>0?alerts.map((m,i)=>card(m,{isNotif:true,idx:i})):<div style={{background:'var(--surface)',borderRadius:'var(--r)',boxShadow:'var(--card-shadow)',padding:'32px 20px',textAlign:'center'}}><div style={{fontSize:14,fontWeight:600,color:'var(--t2)'}}>No alerts right now</div></div>}
                        <Social/>
                    </div>
                )}

                {tab==='Favs' && (
                    <div className="page-in">
                        <div className="page-head"><h1 className="page-h1">Saved</h1><p className="page-sub">Your saved matches</p></div>
                        {saved.length>0?saved.map(m=>card(m)):<div style={{paddingTop:56,textAlign:'center'}}><div style={{fontSize:36,color:'var(--sep2)',marginBottom:10}}>♡</div><div style={{fontSize:14,fontWeight:600,color:'var(--t2)'}}>Nothing saved yet</div><div style={{fontSize:12,color:'var(--t3)',marginTop:3}}>Tap the heart on any match to save it here.</div></div>}
                        <Social/>
                    </div>
                )}

                {tab==='More' && (
                    <div className="page-in">
                        <div className="page-head"><h1 className="page-h1">More</h1></div>
                        <div className="settings-group">
                            {[['About Us','https://docs.google.com/document/d/1OaaYhaQi3FZzog6YLIoojh3CnX3aN0lrizXyQ5N9Dkw/edit?usp=sharing'],['Terms of Use','https://docs.google.com/document/d/1wO92_LRf7q1vS90SdmHgArGITPkimnMa7g_U_VHFZo4/edit?usp=sharing'],['Privacy Policy','https://docs.google.com/document/d/1qrcuBqJ3RoSTTdjtyHJXidpVNODILbHW5cLx4wlAe6Y/edit?usp=sharing']].map(([l,u])=>(
                                <a key={l} href={u} target="_blank" rel="noopener noreferrer" className="settings-item">{l}<IcoChev/></a>
                            ))}
                            <a href="mailto:Magicbetingtips@gmail.com" className="settings-item">
                                <span style={{display:'flex',alignItems:'center',gap:10}}><IcoMail/> Contact Us</span>
                                <span style={{fontSize:12,color:'var(--t3)'}}>Magicbetingtips@gmail.com</span>
                            </a>
                        </div>
                        <div style={{textAlign:'center',paddingTop:8}}><div style={{fontSize:12,color:'var(--t3)'}}>Magic Analysis · v2.0</div></div>
                        <Social/>
                    </div>
                )}
            </main>

            {/* Calendar */}
            {calOpen && (
                <div className="center-overlay" onClick={()=>setCalOpen(false)}>
                    <div className="center-card" onClick={e=>e.stopPropagation()}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
                            <div><div style={{fontSize:19,fontWeight:700,letterSpacing:'-.4px',marginBottom:2}}>This Week</div><div style={{fontSize:12,color:'var(--t3)'}}>Select a date</div></div>
                            <button onClick={()=>setCalOpen(false)} style={{background:'var(--bg)',border:'none',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontSize:16,color:'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                        </div>
                        <div className="cal-days">
                            {calDays().map(d=>(
                                <div key={d.full} className={`cal-day${d.on?' on':''}`}>
                                    <span className="cal-dd">{d.nm}</span><span className="cal-dn">{d.dn}</span>
                                </div>
                            ))}
                        </div>
                        <button className="btn-primary" style={{marginTop:22}} onClick={()=>setCalOpen(false)}>Confirm</button>
                    </div>
                </div>
            )}

            {/* Coming soon */}
            {csSport && (
                <div className="center-overlay" onClick={()=>setCsSport(null)}>
                    <div className="center-card" style={{textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                        <div style={{fontSize:38,marginBottom:14}}>🔜</div>
                        <div style={{fontSize:21,fontWeight:700,letterSpacing:'-.4px',marginBottom:8}}>Coming Soon</div>
                        <div style={{fontSize:14,color:'var(--t2)',lineHeight:1.55,marginBottom:26}}>Live <strong>{csSport}</strong> predictions are on the way.</div>
                        <button className="btn-primary" onClick={()=>setCsSport(null)}>Got it</button>
                    </div>
                </div>
            )}

            {/* Match detail sheet */}
            {detailMatch && (
                <DetailSheet
                    match={detailMatch}
                    logos={detailLogos}
                    analysis={analysis}
                    analysisLoading={analysisLoading}
                    onClose={()=>{setDetailMatch(null);setAnalysis(null);}}
                    onGetPrediction={()=>fetchPred(detailMatch)}
                />
            )}

            {/* Prediction sheet */}
            {pred && <PredSheet data={pred} onClose={()=>setPred(null)}/>}

            {/* Prediction loading */}
            {predLoad && (
                <div className="pred-loading">
                    <div className="pred-loading-box">
                        <div className="spin" style={{width:26,height:26,borderWidth:2.5}}/>
                        <span className="pred-loading-txt">Loading prediction</span>
                    </div>
                </div>
            )}

            {/* Bottom nav */}
            <nav className="nav">
                {[{id:'Home',lbl:'Home',ico:<IcoHome/>},{id:'Alerts',lbl:'Alerts',ico:<IcoBell/>},{id:'Favs',lbl:'Saved',ico:<IcoHeart on={false}/>},{id:'More',lbl:'More',ico:<IcoMenu/>}].map(({id,lbl,ico})=>(
                    <div key={id} className={`nav-item ${tab===id?'on':'off'}`} onClick={()=>setTab(id)}>
                        <div className="nav-ico">{ico}</div><span className="nav-lbl">{lbl}</span>
                    </div>
                ))}
            </nav>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
